                  file_content: '  公开招标文件项目编号：GZXY25ZB0016G项目名称：中国人寿财产保险股份有限公司湛江中心支公司供应商库（2025年度）采购项目 广州信沅项目管理有限公司二〇二五年七月温馨提示本提示内容仅为善意提醒，非招标文件组成部分，如有不一致，以招标文件为准；接收投标文件时间为投标截止时间前30分钟，投标截止时间一到，招标代理机构不再接收投标人的任何投标文件及相关资料。为避免因迟到而投标文件被拒绝，请适当提前到达；请仔细检查投标文件是否已按要求加盖公章、签名、签署日期；为了提高采购效率，节约社会交易成本与时间，希望购买了招标文件而决定不参加本次投标的投标人，在投标文件递交截止时间的3日前，以书面形式告知招标代理机构。对您的支持与配合，谨此致谢。目      录第一章  投标邀请函第一章 投标邀请函中国人寿财产保险股份有限公司湛江中心支公司供应商库（2025年度）采购项目招标项目的潜在投标人应在广州信沅项目管理有限公司（广东省广州市海珠区礼岗路13号-中盛昌岗汇B座b217）获取招标文件，并于2025年08月19日10点00分（北京时间）前递交投标文件。项目基本情况1.项目编号：GZXY25ZB0016G2.项目名称：中国人寿财产保险股份有限公司湛江中心支公司供应商库（2025年度）采购项目3.预算金额：包组一宣传、广告、专业服务：人民币200万元；包组二车辆增值服务：人民币200万元；包组三健康增值服务：人民币200万元；包组四风险预防服务：人民币200万元；包组五人力资源服务：人民币200万元4.资金来源：非财政性资金5.项目概况：本项目划分五个包组，对中国人寿财产保险股份有限公司湛江中心支公司供应商库进行补充，服务项目以具体需求和委托意向为准。招标人对于合作期间的服务项目数量、来源均不做任何保证和承诺。6.采购需求：标的名称：中国人寿财产保险股份有限公司湛江中心支公司供应商库（2025年度）采购项目简要需求或服务要求：具体服务要求详见招标文件第二章《招标项目内容》。本项目各包组执行兼投不兼中原则，若一家投标人同时投多个包组，则只能按所投包组顺序推荐其为第一中标候选人，不在其他包组中推荐为第一中标候选人。投标人须对所投包组全部内容进行投标，不得分拆。投标人资格要求：1．在中华人民共和国境内注册的法人或其他组织或自然人，投标时提交有效的营业执照（或事业法人登记证或身份证等相关证明）副本复印件。分支机构投标的，须提供总公司和分公司营业执照副本复印件，总公司出具给分支机构的授权书。2.单位负责人为同一人或者存在直接控股、管理关系的不同投标人，不得同时参加本采购项目投标。为本项目提供整体设计、规范编制或者项目管理、监理、检测等服务的投标人，不得再参与本项目投标。（提供资格声明函）3.投标人近3年内（2022年1月1日至今)在经营活动中没有重大违法记录；履约历史中没有处于被责令停业、投标资格被取消、财产被接管、冻结、破产状态；没有骗取中标、恶意欠债不还和严重违约及重大质量问题；须出具无重大违法记录声明。（格式见《无重大违法记录声明》）4.本项目不接受联合体投标。（提供资格声明函）5.已办理投标登记并获取本项目招标文件。获取招标文件时间：2025年07月29日至2025年08月05日（提供期限自本公告发布之日起不得少于5日），每天上午09：30至下午17：00（北京时间，法定节假日除外）。地点：广州信沅项目管理有限公司（详细地址：广东省广州市海珠区礼岗路13号-中盛昌岗汇B座b217，建议采用对公转账或现金支付）。售价：人民币300元一套，售后不退。提交投标文件截止时间、开标时间和地点1.提交投标文件截止时间及开标时间：2025年08月19日10点00分（北京时间）（自招标文件开始发出之日起至投标人提交投标文件截止之日止，不得少于20日）2.地点：广州信沅项目管理有限公司会议室（详细地址：广东省广州市海珠区礼岗路13号-中盛昌岗汇A座三楼会议室，开始接收投标文件时间为投标截止时间前30分钟）。其他补充事宜1．投标人购买招标文件时，需携带以下资料：法定代表人/负责人资格证明书、法定代表人/负责人授权委托书；在中华人民共和国境内注册的法人或其他组织，投标（响应）时提交有效的营业执照（或事业法人登记证等相关证明）副本复印件。分支机构投标的，须提供总公司和分公司营业执照副本复印件，总公司出具给分支机构的授权书；《报名登记表》（《报名登记表》在招标代理机构网站http://www.gzxinyuanzx.com下载中心下载）。3．招标文件费用缴纳银行账户信息：（请用公账转账并注明项目编号后四位数招标文件费用）收款人：广州信沅项目管理有限公司开户行：中国工商银行股份有限公司广州花地大道支行账号：3602824209100262332注：未进行登记的投标人所提交的投标文件，招标人或招标代理机构将拒绝接收。4．已购买文件的投标人，不代表通过资格性审查。6.本项目接受投标单位现场递交或邮寄投标文件，若供应商选择邮寄投标文件的，须在投标截止时间前送达招标代理机构指定地点，并按招标文件要求密封包装，邮费由投标单位自行承担，由于快递原因导致文件破损，代理机构有权拒收。（注：报名文件一起邮寄）邮寄地址：广东省广州市海珠区礼岗路13号-中盛昌岗汇B座b217  联系人及电话：肖小姐18022313513对本次招标提出询问，请按以下方式联系1．招标人信息名称：中国人寿财产保险股份有限公司湛江中心支公司联系人：刘先生联系电话：0759-26286272．招标代理机构信息名称：广州信沅项目管理有限公司地址：广东省广州市海珠区礼岗路13号-中盛昌岗汇B座b217联系人：肖小姐联系方式：18022313513第二章　招标项目内容第二章 招标项目内容投标人须对所投包组的服务进行整体响应，任何只对其中一部分内容进行的响应都被视为无效响应。用户需求书中打“★”号条款为实质性条款，投标人如有任何一条负偏离则导致投标无效。标“▲”号的为比较重要的商务、技术指标，未达到这些指标要求的将被扣分，但不会导致投标无效。一、项目概况1.项目名称：中国人寿财产保险股份有限公司湛江中心支公司供应商库（2025年度）采购项目★2.采购内容：本项目是对中国人寿财产保险股份有限公司湛江中心支公司供应商库进行补充，服务项目以招标人具体需求和委托意向为准。招标人对于合作期间的服务项目数量、来源均不做任何保证和承诺，各投标人参与应标即视同认可此约定。主要明细如下：3．服务期要求：项目签订框架合同，合同期自合同签订日起至2026年6月30日。4．服务地点：按采购人要求指定服务地点。5．质量要求：合格。二、服务内容及要求包组1：宣传、广告、专业服务（一）具体服务内容1.互联网推广：通过移动互联网领域进行产品及服务的广告宣传。根据招标人提供的素材及需求进行互联网推广页面设计，对招标人确认的宣传页面通过移动互联网平台（如微信公众号、保险中介网、供应商营销平台、抖音等）进行线上投放，按线上推广时间或按点击量进行结算，并对推广投放内容进行线上投放测试及维护，以提高曝光量。2.问卷推广：包括但不限于问卷设计、问卷调查和调查结果分析等，根据招标人的具体需求提供建设性的方案和建议。3.电梯广告：根据招标人提供的素材及需求，制作相关物料海报，对招标人确认的宣传页面通过写字楼、住宅小区电梯平面海报或电子屏进行广告投放，按推广时间进行结算。4.地推活动策划与执行：根据招标人需求，提供活动前期策划（包括但不限于活动费用投放方案、活动物料的简单设计、宣传推广方案和预期效果），制作活动物料，并提供地推人员在活动现场驻扎、负责宣传品派发、推广宣导，统筹活动最终落地的执行。5.活动宣传资料：根据招标人需求制作广告宣传物料，形式包括但不限于易拉宝、常规海报、A4宣传页、三折宣传小册等，内容包含但不限于品牌介绍、产品介绍、属地化服务。6.专业咨询：根据招标人需求，供应商提供专业咨询服务，如法律咨询、管理咨询、业务咨询、其他咨询等。（二）服务要求★1.供应商应具备市场营销推广或广告相关的服务内容能力，包括但不限于市场营销策划、市场调查、广告设计、代理、广告发布、技术推广、业务咨询等。（自行提供证明材料，如营业执照经营范围、最少一份同类往期业绩或其他证明材料等。）2.在以上合作的基础上，双方可友好协商，增加服务项目内的相关细项。3.按国家或行业规定的质量标准（有国家标准依国家标准，没有国家标准的依行业标准），保证所提供服务的质量和效率。4.投放范围：实体投放范围为湛江市内；线上投放全国范围内均可，以广东省内为主。包组2：车辆增值服务为促进业务的发展，提升客户对我司售后服务认可、提高客户忠诚度，吸引优质客户，为提升部门车险业务的市场竞争力及客户满意度，计划引入专业车辆增值服务供应商，通过提供多元化、高品质的增值服务增强客户黏性，扩大市场占有率。（一）具体服务内容1.车辆安全检测（1）发动机检测（包括但不限于电瓶、机油、空滤、燃油、冷却等）（2）制动检测（包括但不限于制动系统功能、刹车油、刹车片磨损等）（3）底盘检测（包括但不限于半轴、平衡杠、减震、方向球头、上下支臂等）（4）轮胎检测（包括但不限于胎面状况、胎压、花纹深度、动平衡等）（5）汽车电子系统检测汽车电子系统检测（包括但不限于车内电气部分、仪表盘等指示灯）2.机油保养（1）半合成机油保养（4L），含发动机动力安全检测、不含机油格（2）全合成机油保养（4L），含发动机动力安全检测、不含机油格3.洗车服务：标准洗车（车身外观清洁、车内除尘）4.车内清洁、消毒服务：车内除尘、清洁、消毒杀菌5.打蜡服务：车身外观清洁，打蜡6.四轮定位7.路边维修：换胎、充电、加水和其它小于25分钟机械修理的范围。8.代步车：代为送检、代为驾驶、安全停靠。9.新能源：对新能源车进行三电维护、底盘检查、灯光检查、轮胎及制动检查。10.困境救援：汽车如发生故障不能继续行驶，协助安排将车辆拖至最近的汽车生产厂商授权的维修商或客户指定的维修商修理；服务范围为50公里范围以内的服务地点，（不包括高速公路、隧道、大桥、高架道路和其他交通部门或其他部门规定限制第三方道路救援活动的路段）。（二）服务要求★1.供应商应具备有车辆检测维修相关的服务能力，包括但不限于：（1）机动车检验检测服务、汽车拖车、求援、清障服务、机动车修理和维护等（自行提供证明材料，如营业执照经营范围、最少一份同类往期业绩或其他证明材料等）；（2）应当具有服务大中型保险公司客户的服务经验。（自行提供证明材料，如营业执照经营范围、合作协议、最少一份同类往期业绩或其他证明材料等。）2.在以上服务内容的基础上，双方可友好协商，增加车辆相关服务项目。3.按国家或行业规定的质量标准（有国家标准依国家标准，没有国家标准的依行业标准），保证所提供服务的质量和效率。★4.服务过程中务必做好客服工作，确保服务礼仪，不得引起客户投诉。投诉经查证属实，每次投诉扣除当次结算费用的50%，每个季度投诉数量超过5个客户的，招标人有权终止合同关系。（须提供承诺函，格式自拟，并加盖公章）▲5.系统平台服务保障，承担合作期间内的所有义务，除提供平台服务外，还需提供7*24小时服务热线，售后服务故障维护响应时间24小时内解决。6.服务范围广东省范围内均可，以湛江市内为主。包组3：健康增值服务（一）具体服务内容1.健康档案建立：为招标人客户建立个人健康档案，获取有针对性的健康管理和疾病预防指引。2.门诊医疗服务，包括但不限于：（1）就医陪诊服务：为招标人客户提供就医陪诊服务，时长不超过4小时（2）门诊挂号预约服务：为招标人客户提供专家门诊预约服务（三级甲等医院副主任以上医师）3.健康体检服务：为招标人客户提供常规体检服务（医院体检中心或专业体检机构）4.健康咨询服务（线上咨询）5.其他健康增值服务，包括但不限于：（1）应急药箱服务：包含家庭常用应急物品如创可贴、医用棉签、医用消毒酒精、体温计、跌打药、藿香正气水、常用退烧药、止痛药、止泻药、过敏药等各1盒（2）专家健康讲座（3）住院/手术安排（4）医护上门（5）加急检查：帮助客户优先安排医院内各种检查项目，检查内容包含：B超、CT、核磁共振、PET-CT、体检、肠胃镜等。6.其他相关服务（二）服务要求★1.供应商应具备有医疗、健康相关服务能力，包括但不限于：（1）健康管理、健康咨询服务等（自行提供证明材料，如营业执照经营范围、最少一份同类往期业绩或其他证明材料等）；（2）应当具有服务大中型保险公司客户的服务经验。（自行提供证明材料，如营业执照经营范围、合作协议、最少一份同类往期业绩或其他证明材料等。）2.在以上服务内容的基础上，双方可友好协商，增加健康管理相关服务项目。3.按国家或行业规定的质量标准（有国家标准依国家标准，没有国家标准的依行业标准），保证所提供服务的质量和效率。★4.服务过程中务必做好客服工作，确保服务礼仪，不得引起客户投诉。投诉经查证属实，每次投诉扣除当次结算费用的50%，每个季度投诉数量超过5个客户的，招标人有权终止合同关系。（须提供承诺函，格式自拟，并加盖公章）▲5.系统平台服务保障，承担合作期间内的所有义务，除提供平台服务外，还需提供7*24小时服务热线，售后服务故障维护响应时间24小时内解决。6．服务范围全国范围内均可，以广东省内为主。包组4：风险预防服务1.主要承担招标人及辖内分支机构的客户非车险风险预防工作（保前风险查勘、保中风险预防）。本次采购的服务包括但不限于安全风险评估和安全评价、隐患排查治理、安全风险宣传教育培训等风控服务，服务项目以具体需求和委托意向为准。（1）风险评估：对投保企业进行全面的风险辨识与评估，分析可能存在的安全风险因素，制定针对性的风险管控措施。（2）隐患排查治理：定期开展安全隐患排查，协助企业建立隐患排查治理台账，跟踪隐患整改情况，确保隐患得到及时、有效治理。（3）安全风险培训教育：根据企业需求，组织开展安全风险辨识、安全操作规程、应急处置等方面的培训教育活动，提高企业员工的安全意识和操作技能，降低招标人承保风险。（4）在以上服务内容的基础上，双方可友好协商，增加风险预防相关服务项目。2.供应商在接到招标人发起的风险预防服务需求后，应开展风险查勘及预防服务，并在为招标人、客户开展风险预防服务后，向招标人出具服务成果报告。▲3.招标人、中标人双方开展具体业务时，将根据业务需求进行协商，确认交易结构，并另行签署相关具体业务协议等文件，就各项具体合作业务的合作方式以及双方的权利义务作出详细规定。该具体业务协议中对招标人、中标人双方权利义务的规定与框架协议规定不一致的，应以具体业务协议为准。包组5：人力资源服务根据招标人需求提供专业人员，并保证其按招标人劳务项目的内容及标准，按时、按质完成任务(包括不限于客户维护、业务拓展、办公室区域的卫生的清洁、事故查勘定损、财产险出单、开拓新车行、维护已合作车行，完成车行渠道销售任务等)。三、其他服务要求（适用于所有包组）★1.要求为招标人配备专业的客户经理1名，负责具体的合同签订、服务提供过程相关问题的沟通与对接、结算等相关事宜，保证中标后项目的顺利开展。（须提供承诺函，格式自拟，并加盖公章）2.服务数量需根据招标人优质客户的数据而定，服务项目以具体需求和委托意向为准。招标人对于合作期间的服务项目数量、来源均不做任何保证和承诺。招标人、中标人双方开展具体业务时，将根据业务需求进行协商，确认交易结构，并另行签署相关具体业务协议等文件，就各项具体合作业务的合作方式以及双方的权利义务作出详细规定。具体业务协议中对招标人、中标人双方权利义务的规定与框架协议规定不一致的，应以具体业务协议为准。★3.招标人在中华人民共和国境内使用投标人提供的货物及服务时免受第三方提出的侵犯其专利权或其它知识产权的起诉。如果第三方提出侵权指控，中标人应承担由此而引起的一切法律责任和费用。（须提供承诺函，格式自拟，并加盖公章）4.中标人保证接受招标人委托的服务事项，不得以任何理由拒绝。▲5.服务过程中产生的收费问题均应在具体合作业务的合同中注明，因中标人自身问题产生的费用均由中标人承担，其他问题由双方协商而定。6.本项目服务地点均为在湛江各区内开展，投标人应根据自身情况提供充足的服务保障（服务内容中另有要求的，以其中的要求为准）。▲7.如供应商因自身原因需要提前终止合作关系，应至少提前2个月告知招标人（告知方式包括但不限于来函、邮件等书面方式）。四、服务价格及款项支付★1.包组1-3,投标人根据项目需求提供参考报价，报价不做评审，投标人中标后，报价价格将作为具体项目服务单价上限，招标人可根据各投标人报价综合情况调整具体服务单价，具体服务单价根据最终确定的具体服务项目情况在具体项目合同中明确。各投标人参与应标即视同认可此约定。2.包组4-5不设投标报价，投标人中标后，后续具体项目服务价格由招标人根据项目保费规模（计费基数，最终由招标人提供）及项目核批费用率上限（最终由招标人提供）核定具体费用上限，投标人在具体项目费用上限额度内进行报价。3.双方约定按月结算服务费用。正常情况下为产生服务事项后的30天内进行结算。4.招标人将在取得符合该经济事项并经招标人认可的合法有效全额增值税专用发票后，15个工作日内通过上级单位中国人寿财产保险股份有限公司的同名银行帐号支付相关款项。▲5.若遇特殊情况或法定节假日，投标人可接受适当顺延。五、验收条款（适用于所有包组）（1)验收标准：在规定的时间内，按照需求完成相应阶段内所有服务内容、提交相应阶段内所有服务成果。（2)验收方式：由招标人组织验收工作，对中标人提供的服务进行验收，如果认为中标人提供的服务与要求不符，将在中标供应商改进服务后重新组织验收，所有验收产生的费用由中标人承担。第三章投标人须知第三章投标人须知一、说明1.总则招标人、招标代理机构及投标人进行的本次招标活动参照《中华人民共和国招标投标法》及其配套的法规、规章、政策。本次公开招标项目，是以招标公告的方式邀请非特定的投标人参加投标。2.适用范围本招标文件仅适用于本次招标公告中所涉及的项目和内容。3.招标当事人3.1招标人：本项目是指“中国人寿财产保险股份有限公司湛江中心支公司”，对本次招标活动负有主体责任，并按照本项目招标文件要求开展招标各项工作。3.2招标代理机构：本项目是指“广州信沅项目管理有限公司”，受招标人委托，依据法律法规以及受托权限的规定，组织本次招标活动。3.3招标单位：指招标人或招标代理机构。3.4投标人：响应招标、已在招标代理机构处领购招标文件并参加投标的法人或者其他组织。任何未在招标代理机构处领购招标文件的法人或者其他组织均不得参加投标。3.5合格的投标人：具备招标文件规定的资格要求和实质性要求、条件。3.6中标人/中标单位：经评标委员会评审确定的对招标文件做出实质性响应，并经招标人按照规定在评标委员会推荐的中标候选人中确定的投标人。4.合格的货物、工程和服务4.1“货物”是指投标人制造或组织符合招标文件要求的货物等。投标的货物必须是其合法生产的符合国家有关标准要求的货物，并满足招标文件规定的规格、参数、质量、价格、有效期、售后服务等要求。4.2“工程”是指满足国家相关法律、法规、规章等规定，并符合本项目相关质量要求、安全文明施工要求的工程。4.3“服务”是指除货物和工程以外的其他对象，其中包括：投标人须承担的运输、安装、技术支持、培训以及符合招标文件规定的其它服务。5.投标费用5.1投标人应承担所有与准备和参加投标有关的费用。不论投标的结果如何，招标单位均无义务和责任承担这些费用。5.2本项目收取代理服务费，具体如下：代理服务费收费标准：招标代理服务费经约定为各包组人民币5000元整，按入库供应商数量平均分摊收取，五个包组共人民币25000元整。代理服务费收费对象：□招标人☑中标人代理服务费缴费账户为：收款人：广州信沅项目管理有限公司开户银行：中国工商银行股份有限公司广州花地大道支行银行账号：3602824209100262332用途：“项目编号”中标费二、招标文件6.招标文件的构成6.1招标文件由下列文件组成：1）投标邀请函2）招标项目内容3）投标人须知4）合同格式5）投标文件格式6）在招标过程中由招标单位发出的修正和补充文件等6.2投标人应仔细阅读本项目招标公告及招标文件的所有内容（包括变更、补充、澄清以及修改等，且均为招标文件的组成部分），按照招标文件要求以及格式编制投标文件，并保证其真实性，否则一切后果自负。7.招标文件的澄清和修改7.1招标文件发出后,在提交投标文件截止时间15日前，招标人可对招标文件进行必要的澄清或修改。该澄清或者修改的内容为招标文件的组成部分。7.2招标文件的澄清或修改均以书面形式明确的内容为准。当招标文件的澄清、修改、补充等在同一内容的表述不一致时，以最后发出的书面形式的文件为准。8.现场踏勘（如有）8.1招标文件规定组织踏勘现场的，招标人按招标文件规定的时间、地点组织投标人踏勘项目现场。8.2投标人自行承担踏勘现场发生的责任、风险和自身费用。8.3招标人在踏勘现场中介绍的资料和数据等，只是为了使投标人能够利用招标人现有的资料。招标人对投标人由此而作出的推论、解释和结论概不负责。三、投标文件的编制9.投标的语言及计量9.1投标人提交的投标文件以及投标人与招标单位就有关投标的所有来往函电均应使用中文。投标人提交的支持文件或印刷的资料可以用另一种语言，但相应内容应附有中文翻译本，在解释投标文件的修改内容时以中文翻译本为准。对中文翻译有异议的，以权威机构的译本为准。9.2除非招标文件中另有规定，投标人在投标文件中及其与招标单位的所有往来文件中的计量单位均应采用中华人民共和国法定计量单位。10投标文件的构成应符合法律法规及招标文件的要求。10.投标文件的编制10.1投标人应当对投标文件进行装订，对未经装订的投标文件可能发生的文件散落或缺损，由此产生的后果由投标人承担。投标人对招标文件中多个包进行投标的，其投标文件的编制应按每个包的要求分别装订和封装。10.2投标人应完整、真实、准确的填写招标文件中规定的所有内容，对投标文件所提供的全部资料的真实性承担法律责任，并无条件接受招标单位及招标监督管理部门等对其中任何资料及招标单位或招标监督管理部门认为有必要的资料进行核实的要求。10.3如果因为投标人投标文件填报的内容不详，或没有提供招标文件中所要求的全部资料及数据，由此造成的后果，其责任由投标人承担。11.投标报价11.1如招标文件无特殊规定，投标价格以人民币填报。11.2投标人应按照招标文件“第二部分招标项目内容”中规定的需求内容、责任范围以及合同条款进行报价，并按《开标一览表》和《投标明细报价表》（如有）确定的格式报出分项价格和总价。投标总价中不得包含招标文件要求以外的内容，否则在评标时不予核减。11.3投标报价包括本项目招标需求和投入使用的所有费用，包括但不限于主件、标准附件、备品备件、施工、服务、专用工具、安装、调试、检验、培训、运输、保险、税款等。11.4投标总价应对所投项目（包组）的全部内容进行报价，如有缺漏，将导致投标无效11.5每种规格货物或每项标准服务只允许有一个报价，否则将被视为无效投标。12.备选方案12.1只允许投标人有一个投标方案，否则将被视为无效投标。13.联合体投标13.1是否接受联合体投标：□是  ☑否13.2接受联合体投标的，应符合以下规定：（1）联合体各方之间应签订共同投标协议书并在投标文件中提交，明确约定联合体各方承担的工作和相应的责任。联合体各方签订共同投标协议书后，不得再以自己名义单独在同一项目（包组）中投标，也不得组成新的联合体参加同一项目（包组）投标，若违反规定则其参与的所有投标将视为无效投标。（2）对于需交投标保证金的，以联合体各方或者联合体中牵头人的名义缴纳。（3）联合体成员存在不良信用记录的，视同联合体存在不良信用记录。（4）联合体中有同类资质的投标人按照联合体分工承担相同工作的，应当按照资质等级较低的投标人确定资质等级。（5）联合体各方应当共同与招标人签订合同，就合同约定的事项对招标人承担连带责任。14.投标保证金（本项目不收取）14.1投标人应按招标文件规定的金额和时间缴纳投标保证金，投标保证金作为投标文件的组成部分。14.2投标人可以自主选择现金、银行保函、保证保险、担保公司担保等方式缴纳投标保证金。（1）投标保证金缴纳金额：/（2）采用现金或者支票形式提交的，投标保证金须从投标人的银行账户转出。投标保证金缴纳账户如下：收款人：广州信沅项目管理有限公司开户银行：中国工商银行股份有限公司广州花地大道支行银行账号：3602824209100262332（3）投标保证金以到达上述保证金账户为准，投标人应按以上所述方式及时间提交投标保证金，招标代理机构不承担投标人的投标保证金未能及时到账的风险。14.3凡未按规定缴纳投标保证金的投标，为无效投标。14.4投标保证金的退还：（1）投标人在投标截止时间撤回已提交的投标文件的，自收到投标人书面撤回通知之日起5日内退还。（2）未中标的投标人投标保证金，自中标通知书发出之日起5日内退还。（3）中标人的投标保证金，自合同签订之日起5日内退还。备注：因投标人自身原因导致无法及时退还的除外。14.5有下列情形之一的，投标保证金将不予退还：（1）投标人在投标有效期内撤销投标文件；（2）中标人未能在规定期限内按要求提交履约担保（如有）；（3）中标后无正当理由放弃中标或不与招标人签订合同。15.履约保证金15.1招标人可根据合同履行需要，要求中标人在合同签订前提交履约保证金。15.2履约保证金数额不超过合同金额的10%，招标人可根据履行合同的实际需要，在以上范围内规定履约保证金具体金额。15.3履约保证金在中标人履行完合同主要义务后，招标人按照合同约定原额退还，履约保证金以履约担保函形式提交的，担保责任终止。16.投标有效期16.1投标文件应在提交投标文件的截止之日起90日保持有效。投标有效期比规定时间短的将被作为非实质性响应招标文件而予以拒绝。16.2投标有效期内投标人撤销投标文件的，招标单位可以不退还投标保证金（如有）。采用投标保函方式替代保证金的，招标单位可以向担保机构索赔保证金。16.3出现特殊情况需延长投标有效期的，招标单位可于投标有效期满之前要求投标人同意延长有效期，要求与答复均以书面形式通知所有投标人。投标人同意延长的，应相应延长其投标保证金（如有）的有效期，但不得要求或被允许修改或撤销其投标文件；投标人可以拒绝延长有效期，但其投标将会被视为无效，拒绝延长有效期的投标人有权收回其投标保证金（如有）。采用投标保函方式替代保证金的，投标有效期超出保函有效期的，招标单位应提示投标人重新开函，未获得有效保函的投标人其投标将会被视为无效。17.投标文件的数量和签署17.1投标人应编制投标文件一式六份，其中正本一份和副本五份，投标文件的副本可采用正本的复印件。每套投标文件须清楚地标明“正本”、“副本”。若副本与正本不符，以正本为准。17.2投标文件的正本需打印或用不褪色墨水书写，并由法定代表人或经其正式授权的代表签字。授权代表须出具书面授权证明，法人证明及法人授权证明均应在投标文件中提供。17.3投标文件中的任何重要的插字、涂改和增删，必须由法定代表人或经其正式授权的代表在旁边加盖公章或签字才有效。17.4投标人必须随投标文件同时提交一套与纸质投标文件内容完全一致的电子文件（含可编辑的WORLD版和加盖公章的PDF版），电子文件放置于U盘或光盘（无病毒）并装于独立的信封，信封上注明“电子文件”。其中所有文件不做压缩处理、不留密码，所有文件用WORD或EXCEL格式处理（资质文件及证书等可扫描以图片格式提交）。18.样品（演示）18.1招标文件规定投标人提交样品的，样品属于投标文件的组成部分。样品的生产、运输、安装、保全等一切费用由投标人自理。18.2投标截止时间前，投标人应将样品送达至指定地点。若需要现场演示的，投标人应提前做好演示准备（包括演示设备）。18.3招标结果公告发布后，中标人的样品由招标人封存，作为履约验收的依据之一。未中标人在接到招标代理机构通知后，应按规定时间尽快自行取回样品，否则视同不再认领，代理机构有权进行处理。19.否决投标的规定除招标文件另有规定外，有下列情形之一的，评标委员会将否决其投标：（1）投标文件未经投标单位盖章和单位负责人签字；（2）投标联合体没有提交共同投标协议；（3）投标人不符合国家或者招标文件规定的资格条件；（4）同一投标人提交两个以上不同的投标文件或者投标报价，但招标文件要求提交备选投标的除外；（5）投标报价低于成本或者高于招标文件设定的最高投标限价；（6）投标文件没有对招标文件的实质性要求和条件作出响应；（7）投标人有串通投标、弄虚作假、行贿等违法行为。四、投标文件的递交20.投标文件的密封、标记和递交20.1投标人应将《开标一览表》《招标代理服务费承诺书》单独密封提交，并在信封上清晰标明“唱标信封”字样。投标人应将投标文件正本和所有的副本分别单独密封包装，并在外包装上清晰标明“正本”、“副本”字样。20.2所有信封外包装上应当注明招标项目名称、项目编号和“在（招标文件中规定的开标日期和时间）之前不得启封”的字样，封口处应加盖投标人印章或签字。具体格式如下：20.3如果未按要求密封和标记，招标单位对误投或提前启封概不负责。20.4招标单位在《投标邀请函》中规定的地点和投标截止时间之前接收投标文件，超过截止时间后的投标为无效投标，招标单位将拒绝接收。21.投标文件的修改和撤回21.1投标人在投标截止时间前，可以对所递交的投标文件进行补充、修改或者撤回，并书面通知招标单位。补充、修改的内容应当按招标文件要求签署、盖章，并作为投标文件的组成部分。在投标截止时间之后，投标人不得对其投标文件做任何修改和补充。21.2投标人在递交投标文件后，可以撤回其投标，但投标人必须在规定的投标截止时间前以书面形式告知招标单位。从投标截止时间至投标有效期结束的这段时间内，投标人不得撤回其投标，否则其投标保证金将不予退还。21.3投标人所提交的投标文件在评标结束后，无论中标与否都不退还。五、开标22.开标程序22.1招标单位在《投标邀请函》中规定的日期、时间和地点组织公开开标。开标时原则上应当有招标人代表和投标人代表参加。参加开标的代表应签到以证明其出席。22.2开标时，由投标人或其推选的代表检查投标文件的密封情况，经确认无误后由招标工作人员当众拆封，宣读投标人名称、开标一览表中的其他主要内容和招标文件允许提供的备选投标方案。22.3招标代理机构做好开标记录，开标记录由各投标人签字确认。22.4投标截止时间后，投标人不足3家的，不得开标。同时，本次招标活动结束。23.开标异议投标人代表对开标过程和开标记录有疑义，以及认为招标人、招标代理机构相关工作人员有需要回避的情形的，应当场提出询问或者回避申请。投标人未参加开标的，视同认可开标结果。六、评审24.评标要求24.1评标方法本项目采用综合评分法，即投标文件满足招标文件全部实质性要求，且按照评审因素的量化指标评审得分最高的投标人为中标候选人的评标方法。（注：最低报价不是中标的唯一依据）24.2评标原则24.2.1评标活动遵循公平、公正、科学和择优的原则，以招标文件和投标文件为评标的基本依据，并按照招标文件规定的评标方法和评标标准进行评标。24.2.2具体评标事项由评标委员会负责，并按招标文件的规定办法进行评审。24.2.3合格投标人不足3家的，不得评标。24.3评标委员会24.3.1评标委员会由招标人代表和评审专家组成，成员人数应当为5人及以上单数，其中评审专家不得少于成员总数的三分之二。24.3.2评标应遵守下列评标纪律：（1）评标情况不得私自外泄，有关信息由广州信沅项目管理有限公司统一对外发布。（2）对招标单位或投标人提供的要求保密的资料，不得摘记翻印和外传。（3）不得收受投标人或有关人员的任何礼物，不得串联鼓动其他人袒护某投标人。若与投标人存在利害关系，则应主动声明并回避。（4）全体评委应按照招标文件规定进行评标，一切认定事项应查有实据且不得弄虚作假。（5）评标委员会各成员应当独立对每个投标人的投标文件进行评价，并对评价意见承担个人责任。评审过程中，不得发表倾向性言论。对违反评标纪律的评委，将取消其评委资格，对评标工作造成严重损失者将予以通报批评乃至追究法律责任。24.4视为串通投标的情形有下列情形之一的，视为投标人串通投标，其投标无效：（1）不同投标人的投标文件由同一单位或者个人编制；（2）不同投标人委托同一单位或者个人办理投标事宜；（3）不同投标人的投标文件载明的项目管理成员或者联系人员为同一人；（4）不同投标人的投标文件异常一致或者投标报价呈规律性差异；（5）不同投标人的投标文件相互混装；（6）不同投标人的投标保证金或购买电子保函支付款为从同一单位或个人的账户转出。说明：在评标过程中发现投标人有上述情形的，评标委员会应当认定其投标无效。同时，项目评审时被认定为串通投标的投标人不得参加该合同项下的招标活动。24.5投标无效的情形详见资格性及符合性审查和招标文件其他投标无效条款。24.6价格修正对报价的计算错误按以下原则修正：（1）投标文件中开标一览表内容与投标文件中相应内容不一致的，以开标一览表为准；（2）大写金额和小写金额不一致的，以大写金额为准；（3）单价金额小数点或者百分比有明显错位的，以开标一览表的总价为准，并修改单价。（4）总价金额与按单价汇总金额不一致的，以单价金额计算结果为准。但是单价金额计算结果超过预算价的，对其按无效投标处理。注：同时出现两种以上不一致的，按照前款规定的顺序进行价格澄清。澄清后的价格加盖公章确认后产生约束力，但不得超出投标文件的范围或者改变投标文件的实质性内容，投标人不确认的，其投标无效。26.评审程序26.1资格性及符合性审查资格性及符合性审查。评标委员会依据招标文件的规定，从投标人的资格、投标文件的有效性、完整性和对招标文件的响应程度进行审查，以确定是否对招标文件的实质性要求作出响应。（详见后附表资格性及符合性审查表）资格性及符合性审查中凡有其中任意一项未通过的，评审结果为未通过，未通过资格性及符合性审查的投标人按无效投标处理。对各投标人进行资格性及符合性审查过程中，对初步被认定为无效投标者，由评标委员会组长或招标人代表将集体意见及时告知投标当事人。合格投标人不足3家的，不得评标。资格性及符合性审查表（各包组均适用）：26.2投标文件澄清26.2.1对于投标文件中含义不明确、同类问题表述不一致或者有明显文字和计算错误的内容，评标委员会应当在评审过程中发起澄清，要求投标人针对价格或内容做出必要的澄清、说明或补正。代理机构可根据开标环节记录的授权代表人联系方式发送短信提醒或电话告知。26.2.2评标委员会不接受投标人主动提出的澄清、说明或补正。26.2.3评标委员会对投标人提交的澄清、说明或补正有疑问的，可以要求投标人进一步澄清、说明或补正。26.3详细评审包组一：宣传、广告、专业服务包组二：车辆增值服务包组三：健康增值服务包组四：风险预防服务包组五：人力资源服务26.4汇总、排序评标结果按评审后总得分由高到低顺序排列，总得分相同的按以下顺序排列：（1）技术得分由高到低；（2）商务得分由高到低。如以上都相同，由评标委员会采取随机抽取的方式确定。26.5中标价的确定除了按评标要求进行价格修正并经投标人确认的投标报价作为中标价外，中标价以开标时公开唱标价为准。26.6其他无效投标的情形：（1）评标期间，投标人没有按评标委员会的要求提交法定代表人或其委托代理人签字的澄清、说明、补正或改变了投标文件的实质性内容的。（2）投标文件提供虚假材料的。（3）投标人以他人名义投标、串通投标、以行贿手段谋取中标或者以其他弄虚作假方式投标的。（4）投标人对招标人、招标代理机构、评标委员会及其工作人员施加影响，有碍招标公平、公正的。（5）投标文件含有招标人不能接受的附加条件的。（6）法律、法规和招标文件规定的其他无效情形。七、定标27.中候选人的公示招标人自收到评标报告之日起的法定时间内公示中标候选人，公示期不少于3日。28.中标人的确定招标人按照评标报告中推荐的中标候选人顺序确定中标人，并向中标人发出《中标通知书》，《中标通知书》对中标人和招标人具有同等法律效力。八、异议与投诉29.异议对招标文件有异议的，应当在投标截止时间10日前提出；对开标有异议的，应当在开标现场提出；对评标结果的异议，应当在公示期内提出。异议联系方式如下：联系人：肖小姐电话：18022313513邮箱：xinyuan_zbgz@163.com地址：广东省广州市海珠区礼岗路13号（中盛昌岗汇B座b217）邮编：51000030.投诉投标人或者其他利害关系人认为招标投标活动不符合法律、行政法规规定的，可以自知道或者应当知道之日起10日内向有关行政监督部门投诉。投诉应当有明确的请求和必要的证明材料。九、合同签订和履行34.合同签订34.1招标人应当自《中标通知书》发出之日起三十日内，按照招标文件和中标人投标文件的约定，与中标人签订合同。所签订的合同不得对招标文件和中标人投标文件作实质性修改。34.2招标人不得提出试用合格等任何不合理的要求作为签订合同的条件，且不得与中标人私下订立背离合同实质性内容的协议。34.3合同条款中应规定，乙方完全遵守《中华人民共和国民法典》有关规定和《中华人民共和国妇女权益保障法》中关于“劳动和社会保障权益”的有关要求。35.合同的履行合同订立后，合同各方不得擅自变更、中止或者终止合同。第四章 合同格式（《招标项目内容》中另有规定的，以招标人需求为准）注：本合同条款仅供参考，甲乙双方可根据实际情况进行补充。***服务合同甲方：法定代表人： 地址：乙方：法定代表人： 地址：鉴于：本合同双方当事人（1）均为依照中华人民共和国法律成立并有效存续的独立法人或其分支机构，（2） 已经获得签署本合同的相应授权，（3）具备履行本合同所必须的资质和条件。为保障双方的合法权益，根据《中华人民共和国民法典》及相关法律法规的规定， 甲、乙双方在平等互利、协商一致的基础上，达成协议如下：第一条项目内容及要求（一）项目名称中国人寿财产保险股份有限公司湛江中心支公司****供应商库项目。（二）项目内容1.合作内容：若甲方在法律法规的规定范围内，计划开展****类项目，甲方可根据需要与乙方合作，由乙方为甲方提供具体服务。2.合作范围：本协议的签订仅代表乙方获得为甲方提供****服务的资格，不代表获得具体的服务任务。具体的服务任务及服务实施内容，双方需签订具体的委托合同或业务协议。第二条合作原则（一）平等自愿原则。甲乙双方自愿选择对方作为合作伙伴，互相支持、共同发展。（二）依法合规原则。甲乙双方的合作应遵守并执行国家法律法规、监管机构的监管规定，同时符合国家宏观经济政策、产业政策和保险监管政策。（三）合作共赢原则。甲乙双方充分发挥各自优势，以相应资源和优质服务积极支持对方的业务发展。（四）在双方业务发展的过程中，在没有违反《中华人民共和国反垄断法》、《中华人民共和国反不正当竞争法》的前提下，各方应当考虑优先使用对方的业务渠道。（五）在本协议有效期内，任何一方在考虑到对方已有业务、渠道的前提下，应当优先考虑与对方进行合作。第三条合作模式（一）为积极落实本协议，保持双方间的业务信息畅通，甲乙双方应指定责任部门和人员负责日常联络，并采取高层互访、业务交流研讨等多种形式，及时沟通业务合作进展情况，不断拓展业务合作新领域，并实施相应的调整策略，不断对本协议的其它方面进行补充、完善和修改。（二）本协议不能取代、替换甲乙双方或其下属公司另行签订的具体业务协议，具体合作事项均以具体业务协议为准。双方的权利和义务（一）甲乙双方的合作应以符合法律法规及监管规定为前提。（二）甲乙双方应就上述合作进行及时、友好沟通与交流，并应对方的合理要求提供协助，包括但不限于提供与交易有关的真实、完整的文件、资料和信息。（三）甲乙双方开展任何模式项下的具体业务时，将根据业务需求进行协商，确认交易结构，并另行签署相关具体业务协议等文件，就各项具体合作业务的合作方式以及双方的权利义务作出详细规定。该具体业务协议中对甲乙双方权利义务的规定与本协议规定不一致的，应以具体业务协议为准。（四）双方合作期间，未经甲方书面同意，乙方不得使用甲方的品牌标识、名称及商标开展任何宣传活动。（五）在合作期内，如发生乙方瑕疵履行本协议及相关具体协议或以下情况（包括但不限于）：乙方无法完成甲方的项目需求，乙方所提供的服务质量、服务时效、技术对接服务、项目管理能力不符合甲方要求，乙方所提供的售后服务不符合甲方（包含甲方分支机构，以下简称甲方）或甲方客户要求，乙方未合格完成合同考核条款或其他需要重新考察的情况，甲方可以取消乙方的服务供应商库入库资格，并解除本协议及相关的具体协议，且不承担任何违约责任。（六）本协议之签署不影响任何一方在本协议有效期内与本协议以外的第三方进行合作。第五条不可抗力（一）本协议任何一方因不可抗力不能履行本协议约定的全部或部分义务，应尽快通知另一方，并应在可抗力发生后3日内以书面形式向对方提供详细情况报告及不可抗力对履行本协议影响程度的说明。甲、乙双方应根据不可抗力对协议履行的影响程度，协商确定是否终止协议，或继续履行本协议。（二）本协议任何一方均不对因不可抗力无法履行或迟延履行义务而使对方遭受到任何损失承担责任，但遭受不可抗力影响的一方有责任采取适当和必要的措施减轻或消除不可抗力的影响。遭受不可抗力影响的一方应当对未尽本项责任造成或扩大的损失承担责任。（三）协议一方迟延履行后发生不可抗力的，不能免除其责任。第六条保密条款（一）在本合同签订前或履行过程中一方（以下简称“披露方”）向对方（以下简称“接收方”）披露的，或由于签订、履行本合同而产生的，或一方可合理判断出为对方机密或专有的任何信息，无论以何种形式或载于何种载体，无论是否有现时的或将来的经济利益，无论在披露或产生时是否以口头、图像或以书面方式表明其具有保密性，均视为保密信息。（二）保密信息的披露1.除双方另有约定或法律法规有规定之外，双方不得将保密信息向第三方（本合同保密条款中的“第三方”，均指除甲乙双方之外的任何自然人、法人或非法人组织，包括但不限于甲乙双方关联公司、顾问、合作方等）披露；2.双方可向各自员工披露保密信息，但该员工须是为签订或履行本合同而必须知晓保密信息的员工，且向其披露的保密信息仅限于与其职责相应的部分；3.对于未签订或履行本合同而必须知晓保密信息的第三方，或法律法规规定应向其披露保密信息的第三方（司法机关、行政机关、仲裁机构除外），一方可向其披露与其职责相应的保密信息，但披露前应向该第三方书面告知披露的信息为商业秘密，并应取得第三方将按不低于本合同约定的程度履行保密义务的书面承诺，该书面承诺应向甲乙双方作出；4.第三方为司法机关、行政机关、仲裁机构的，一方可依照法律法规规定或为自己作为参与人的诉讼、仲裁的目的向该第三方披露保密信息，但披露前应向该第三方书面告知披露的信息为商业秘密，且应要求诉讼、仲裁非公开进行，判决书、裁决书不公开；接收方须及时就前述披露事先向披露方发出书面通知，并应配合披露方采取适当和有效的措施以依法避免或限制对保密信息的披露。（三）保密信息的使用1.在向符合本合同约定的人员披露保密信息的前提下，双方仅可为履行本合同的目的，或在本合同约定的用途内使用保密信息，不得将保密信息用于本合同之外的目的或其他用途。2.双方应在满足履行本合同需求的基础上，最小限度地使用保密信息。第七条商业贿赂的禁止1.甲乙双方应当严格遵守中华人民共和国关于反商业贿赂的法律规定，甲方或乙方均不得向对方或对方经办人或其他相关人员索要、收受、提供、给予协议约定外的任何个人利益，包括但不限于明扣、暗扣、现金、购物卡、实物、有价证券、旅游或其他非物质性利益等，但如该等利益属于行业惯例或通常做法，则须在协议中明示。而且在协议中明示之利益必须以转账方式划至协议对方之对公账户，不得以现金或转账或其他任何方式支付予个人。2.甲乙双方均有义务严格禁止己方经办人员的任何商业贿赂行为。任何一方或一方经办人员发生前款所列示的任何一种行为，该等行为都是违反国家法律的行为，并将受到国家法律的惩处。构成犯罪的，任何一方有义务依法向国家司法机关举报犯罪行为，使有商业贿赂行为的一方或一方经办人员受到刑事法律惩处。3.如因一方或一方经办人违反上述规定，给对方造成损失的，应承担损害赔偿责任。4.本条所称“其他相关人员”是指甲乙方经办人以外的与协议有直接或间接利益关系的人员，包括但不限于协议经办人的亲友。第八条违约责任(一）除本协议其他条款有具体规定外，任何一方不履行本协议约定的义务或违反本协议的规定，均被视为违约。违约方在收到对方通知后7个工作日内，必须纠正违约行为并赔偿对方由此而产生的损失。若因一方违约给守约方造成不良的社会影响，守约方有权要求违约方采取必要措施消除影响。(二）因乙方所提供的产品或服务不满足合同或甲方要求的，甲方有权要求乙方限时整改，如整改期满仍存在问题的，甲方有权解除合同，并要求乙方退回甲方已支付款项。第九条协议的变更和解除（一）协议变更对本协议的任何变更或补充，须经甲乙双方协商一致，并另行签订书面补充协议。（二）协议解除在本协议的履行过程中，任何一方如果拒绝按照本协议原则和精神开展合作，或严重违反本协议内容损害另一方在合作中的利益，或违法违规经营，或有其他严重损害客户利益的行为时，守约方可以书面通知违约方解除本协议。第十条法律适用与争议解决（一）本协议的订立、效力、解释、履行和争议的解决均适用中华人民共和国法律（不包括港澳台地区法律）。（二）争议解决条款凡因协议引起的或与本协议有关的任何争议，双方首先应友好协商解决。如未能协商解决，任何一方可向甲方住所地人民法院提起诉讼。第十一条协议生效及其他（一）本协议自双方盖章之日起生效，有效期至2026年6月30日。（二）本协议是对双方权利义务的原则性约定，不构成双方具体合作业务项下法律上的权利义务。（三）双方另行签订的具体业务协议，应在符合国家政策和法律、法规且符合双方业务审批条件和办理程序的前提下进行。如有与本协议冲突之条款，以具体业务协议为准。（四）本协议一式贰份，甲乙双方各执壹份，具有同等法律效力。甲方（盖章）：                         乙方（盖章）：日期：                                   日期：第五章 投标文件格式投标文件（正本/副本）项目名称： 项目编号：包组号：包组名称： 投标人名称：                日      期：    年   月   日第一部分 自查表一、资格性及符合性自查表注：以上材料将作为投标人有效性审核的重要内容之一，投标人必须严格按照其内容及序列要求在投标文件中对应如实提供，对资格性证明文件的任何缺漏和不符合项将会直接导致无效投标！投标人根据自查结论在对应的□打“√”。二、商务技术评审自查表注：投标人应根据《详细评审表》的各项内容填写此表。第二部分 资格性及符合性文件一、投标函致：中国人寿财产保险股份有限公司湛江中心支公司/广州信沅项目管理有限公司根据贵方为（项目名称）（项目编号）项目招标采购服务的投标邀请，签字或盖章代表（姓名、职务）经正式授权并代表投标人（投标人名称、地址）提交下述投标文件（正本一份、副本五份及电子文档一份）。自查表；资格性及符合性文件；商务部分；技术部分；价格部分。在此，我方声明如下： 同意并接受招标文件的各项要求，遵守招标文件中的各项规定，按招标文件的要求提供报价。投标人将按招标文件的规定履行合同责任和义务。 我方在参与投标前已详细研究了招标文件的所有内容，包括澄清、修改文件（如果有）和所有已提供的参考资料以及有关附件，我方完全明白并认为此招标文件没有倾向性，也不存在排斥潜在投标人的内容，我方同意招标文件的相关条款，放弃对招标文件提出误解和异议的一切权力。本投标有效期按招标文件规定，中标单位投标有效期延至合