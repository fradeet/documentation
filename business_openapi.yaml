                  file_content: "公开招标文件项目编号:GZGK24E579C0807Z项目名称:中国人寿财产保险股份有限公司广州分公司2025年8月-2026年8月业务运营类服务外包采购项目 广东国科招标有限公司2025年7月特别提醒：投标注意事项投标截止时间一到，本招标代理机构不接收投标人的任何投标文件及相关资料。为此，请适当提前到达。投标保证金最好在投标截止时间前一个工作日到达我公司账户（投标保证金账户：广东国科招标有限公司，账号：详见招标文件，开户银行：广发银行股份有限公司广州财富广场支行）。由于转账当天不一定能够到账，为避免因投标保证金未到账而导致投标被拒，建议至少提前二个工作日转账。投标人请注意区分邮购招标文件、投标保证金及招标代理服务费各收款账号的区别。务必将投标保证金按招标文件的要求存入指定的投标保证金缴纳账户，切勿将款项转错账户，以免影响投标及保证金退还的速度。邮购招标文件、招标代理服务费存入指定的招标代理服务费缴费账户。请正确填写《开标一览表》。如有多包项目请仔细检查采购包，采购包跟采购包内容必须一致。请仔细检查招标文件要求盖公章、签名、签署日期之处。如所投产品属于许可证管理范围内的，须提交相应的许可证复印件。如投标人以非独立法人注册的分公司名义代表总公司盖章和签署文件的，须提供总公司的营业执照副本复印件及总公司针对本项目投标的授权书原件。加★号的条款必须一一响应。投标文件应按顺序编制页码。因场地有限，\_我公司无法提供停车位，不便之处敬请谅解。如有需要，请到周边的停车场停车，建议改乘公共汽车或出租车等交通工具。为了提高采购效率，节约社会交易成本与时间，本公司希望购买了招标文件而决定不参加本次投标的投标人，在投标文件递交截止时间的3日前，按《投标邀请函》中的联系方式，以书面形式告知招标代理机构。对您的支持与配合，谨此致谢。（本提示内容非招标文件的组成部分，仅为善意提醒。如有不一致，以招标文件为准。）目  录投 标 邀 请 函各（潜在）投标人：广东国科招标有限公司（以下简称“招标代理机构”）受中国人寿财产保险股份有限公司广州分公司（以下简称“招标人”）委托，对中国人寿财产保险股份有限公司广州分公司2025年8月-2026年8月业务运营类服务外包采购项目进行公开招标采购，欢迎符合条件的投标人参加投标。项目编号：GZGK24E579C0807Z项目名称：中国人寿财产保险股份有限公司广州分公司2025年8月-2026年8月业务运营类服务外包采购项目 招标内容及需求详细服务要求请参阅招标文件中第二章“采购需求”；合格的投标人应对所有招标货物和服务进行报价，不允许只对部分货物和服务进行报价。投标人资格要求：1.具有独立承担民事责任能力的在中华人民共和国境内注册的法人或其它组织或自然人，投标时提交有效的营业执照（或事业法人登记证或身份证等相关证明）副本复印件。分支机构投标的，须提供总公司和分公司营业执照副本复印件，总公司出具给分支机构的授权书。2.投标人具有依法缴纳税款和社会保障资金的良好记录。（提供投标截止前六个月内任意一个月的纳税证明和缴纳社保证明，缺少其中一项则为投标无效；如依法免税和依法不需要缴纳社保资金的，应提供相应证明文件）3.投标人具有良好的商业信誉和健全的财务会计制度。（提供2024年度财务状况报告或2025年任一个月的财务状况报告复印件，新成立公司可提供成立至今的月或季度财务状况报告复印件；或提供银行出具的资信证明复印件。复印件加盖投标人公章。）4.未被列入“信用中国”网站中“失信被执行人、重大税收违法失信主体”。（如查询结果显示“很抱歉，没有找到您搜索的数据”，视为没有上述两类不良信用记录。投标人提供信用中国网站www.creditchina.gov.cn查询结果截图并加盖公章。最终以招标人或采购代理机构评审当日在网上查询结果为准）；5.投标人2022年1月1日至今在经营活动中没有重大违法记录；履约历史中没有处于被责令停业，投标资格被取消，财产被接管、冻结、破产状态；没有骗取中标、恶意欠债不还和严重违约及重大质量问题；须出具《投标信誉承诺函》并加盖投标人公章，格式自拟。6.其他要求：（1）法定代表人或单位负责人为同一人或者存在直接控股、管理关系的不同单位，不得同时参加本项目的投标。（2）本项目不接受联合体投标。（3）已获取本项目招标文件。注：（1）供应商应购买招标代理机构正式对外发售的招标文件才有资格参加投标。（2）本项目采用“在线获取文件系统”（http://oa.gzgkbidding.com/qpoaweb/prg/gys/prolist.aspx）发售招标文件，供应商登录“在线获取文件系统”查询本项目后选择“我要获取采购文件”，按要求填写信息后并上传以下资料：1）法人或者其他组织的营业执照等证明文件；2）招标文件款汇款回单/截图。（3）“在线获取文件系统”操作手册可到广东国科招标有限公司官网的下载中心获取。招标文件发售时间：2025年7月28日起至2025年8月4日止（工作日上午9：00-12：00，下午14：00-17：30，法定节假日除外）。招标文件每套售价人民币300元整（售后不退）。递交投标文件时间：2025年8月18日9:00:00～9:30:00（北京时间）。递交投标文件地址：广州市先烈中路100号科学院大院9号楼东座2楼（中国广州分析测试中心对面）。本项目允许邮寄投标文件。如需邮寄投标文件，请于投标截止时间前送达。邮寄地址：广州市先烈中路100号科学院大院9号楼东座2楼（中国广州分析测试中心对面）；收件人：李小姐 020-87684726。投标截止时间及开标时间：2025年8月18日9:30:00（北京时间）。开标地点：广州市先烈中路100号科学院大院9号楼东座2楼（中国广州分析测试中心对面）。本项目招标公告等信息在相关法定媒体【广东国科招标有限公司网（www.gzgkbidding.com）和中国招标投标公共服务平台（www.cebpubservice.com）】上公布，并视为有效送达。缴纳标书款、招标代理服务费专用账号和缴纳投标保证金专用账号（账号不同，请供应商按指定账户缴纳，否则自行承担费用缴纳错误而造成的后果）（1）缴纳标书款、招标代理服务费专用账号：账户：广东国科招标有限公司账号：7120\_5774\_1941开户银行：中国银行广州先烈中路支行（2）缴纳保证金专用账号：账户：广东国科招标有限公司账号：详见招标文件第三章《投标须知前附表》开户银行：广发银行股份有限公司广州财富广场支行招标人及招标代理机构联系方式：招标代理机构：广东国科招标有限公司招标项目联系人：李小姐、苏先生联系电话：020-87684726、020-87687651购买招标文件联系人：邓小姐联系电话：020-87685501传真号码：020-87685201电子邮箱：gzgk@gzgkbidding.com联系地址：广州市先烈中路100号科学院大院9号楼东座2楼（中国广州分析测试中心对面）邮政编码：510070                 网址：www.gzgkbidding.com招标人：中国人寿财产保险股份有限公司广州分公司联系人: 甄小姐联系电话：020-83093274受理招标项目监督投诉联系人：贾小姐联系电话：020-32331151联系地址：广州市天河区高唐路223号                                                        广东国科招标有限公司                                                               2025年7月28日广东国科招标有限公司具体位置图：（平面指引路线图）（实景指示图）采购需求总体要求标有“★”的条款为必须完全满足的实质性要求，投标人如有一项带“★”的条款未响应或不满足，将按无效投标处理。标有“▲”的条款为重要性要求，投标人如有带“▲”的条款未响应或负偏离的将被严重扣分。投标人在响应详细内容中必须列出具体数值或服务承诺。如果投标人只注明“正偏离”或“无偏离”，将可能被视为“负偏离”，从而可能导致严重影响评标结果。投标人没有在投标文件中注明偏离（文字说明或在服务、商务响应表注明）的参数、配置、条款视为被投标人完全接受。项目概况（一）采购类别：服务类。（二）数量：一项。（三）服务期限：服务期限为一年。（四）采购内容及用途:由中标人提供人员保障服务，根据招标人分配的具体项目需要，安排人员完成营销运营服务或业务咨询服务。（五）项目分包情况：中标人作为招标人指定的外包方，不能再分包、转包任何服务。未经采购人书面同意，中标人不得将本项目管理责任转让给第三方，采购人有权解除合同。 （六）本次招标最终确认3家中标人，为招标人提供劳务外包服务支撑，根据实际服务情况进行结算。 本次项目采用框架协议采购方式，采用三名供应商轮动机制，每月依据渠道需求量，向三家中标供应商动态分配合作需求。在供应商考核周期结束后，依据供应商考核得分重新评估并调整合作优先级顺序，供应商考核周期设置在2025年年底进行。服务要求服务需求1.服务内容:营销运营服务或业务咨询服务：由中标人安排人员，根据招标人分配的具体项目需要，完成业务相关服务及客户服务，工作内容包括但不限于续保提醒、渠道开发拜访、画像定位、话术设计与优化、团队管理与培训、产品/服务讲解、增值服务满意度回访、售后跟进。2.具体需求人数如下：3.服务人员工作地点:招标人在广州市范围内的服务网点；4.项目服务人员高中及以上学历，性别不限，精通普通话，遵纪守法，品行端正，工作责任感强，能吃苦耐劳，工作细致，能承受较强工作压力，有良好的沟通能力和团队合作精神；具备良好的职业素养，无犯罪、劳改、拘留、吸毒等记录，无参与法轮功、恐怖组织等危害社会活动的记录，无行业禁入人员等违法人员；（注：人员需求表中有具体人员要求的，以需求表中为准）4.项目服务人员要听从招标人的安排和分配，在指定的工作场所完成事务类工作，遵守和维护工作秩序，保存完整的沟通记录，保存期限不低于1个月，服务项目数量记录完整；5.项目服务人员应及时高效完成线上、线下各项指标，解决各类潜在或已发生的客诉风险，服务过程合规、规范，保守客户信息，确保客户信息不被第三方获取；6.项目服务人员应配合招标人完成各类规范性或临时紧急性工作；7.项目服务人员不得利用工作之便，进行任何非法或本项目范围外的活动，不得损坏、 丢失、涂改、抽换、伪造所经手的信息数据，不得擅自修改、复制工作资料带离工作场所。如经发现，招标人有权终止服务采购合同，构成犯罪的，依法追究刑事责任。服务质量要求1.中标人应具有专业的服务支持管理团队、科学完善的绩效考核体系制度和风险预判及客诉风险解决的能力。★2.中标人对此项目应配备至少1名项目经理对接日常运营工作，项目经理学历应本科及以上，具备2年及以上外包相关从业服务经验，并按项目所需人力数量配比质量监控人员、培训辅导人员。（提供书面承诺函并加盖投标人公章）★3.中标人严格按照招标文件、相关法规及合同的约定，按招标人要求配齐人员。为保证招标人服务的延续性、稳定性，中标人应处理好服务人员的交接问题的，优先录用现有本项目相关经验的服务人员，保证原有待遇不变，中标人不得由于工资等问题导致影响项目服务质量或影响履约进度。合同签订后，中标人未能在15日内按招标人需求配齐符合需求的项目服务人员，视为中标人违约，招标人有权终止合同。中标人须按照招标人服务人员需求计划，负责人员的招聘及补岗工作，一周内配齐有相应资质的服务人员。招标人可根据实际工作饱和情况，根据需要对服务项目岗位人员数量进行调整。中标人须合理调配人力资源，必要时须妥善解决招标人突发性的人员需求，以保证服务质量。中标人按照招标人要求的用工人数、人员学历要求、经验要求配备相关人员后，须同时向招标人提供对应人员的相关证明，不符合招标人要求的，招标人有权要求中标人对相关人员进行调整。招标人对人员设置和管理工作具有直接指挥权和审定权。人员分派、调整、安排必须征得招标人同意。4.中标人严格遵守劳动法的规定，统一与派驻的服务人员签订劳动或劳务合同，为派驻的服务人员购买意外险等，派驻服务人员的工资、福利、社会保险等费用均由中标人全权负责。中标人因与服务人员就劳资、人身意外伤害等发生纠纷，原则上由中标人自行解决，招标人不对中标人与其安排项目组成员劳动纠纷承担任何责任。5.中标人负责服务人员档案的建立与管理，对服务人员进行管理（包括但不限于员工资料录入、到期续签手续办理，工伤认定申请手续，办理退休、离职手续），承担服务过程中的用工风险，中标人服务人员在本项目范围内发生违法、违规行为的，所造成一切后果及损失， 由中标人承担责任和负责赔偿。6.中标人须建立完善的培训制度、年度培训计划和实施方案，经招标人确认后方可实施。培训形式包括但不限于入职培训、岗前培训、岗位培训；各类型服务人员每年不少于1次服务人员常规培训；各类型服务人员每半年至少接受1次岗位安全、职业安全教育。7.中标人的服务人员应遵守国家的法律法规,如出现违法违纪行为,所造成的一切后果及损失,由中标人承担责任和负责赔偿；出现严重违纪、违规行为,招标人有权要求更换服务人员。中标人因管理不善、服务不规范导致服务纠纷和事故及由此引起的其它事件,由中标人承担责任。8.中标人需负责协调、处理服务人员的突发事件以及与招标人的争议、纠纷。9.中标人应严格遵守招标人有关规章制度、保密承诺及安全作业承诺。如有违反或损害招标人利益的，招标人有权追究中标人管理责任。双方对履行本项目协议过程中知悉的属于对方核心秘密负有保密的责任。未经对方事前书面许可，任何一方均不得向第三方披露该核心秘密；但在披露给对方时已为公众所知的或对方从不负保密义务的第三方处获知的或法律法规要求对方披露的秘密除外。本条规定的效力不因本项目协议终止而终止。中标人须确保其服务人员等均知悉及遵守保密规定，组织对其服务人员进行保密培训，做好劳务人员服务工作内容的保密监督工作。如中标人、其服务人员等因故意违反保密规定而导致相关费用、支出或申索，中标人须向招标人作出赔偿，包括但不限于招标人律师费、诉讼费、保全费、交通费、差旅费等的支出。10.中标人须接受招标人检查监督，包括但不限于服务工作数量、质量、监督或评比工作。中标人有责任和义务应招标人要求提供服务质量报告，报告内容需涵盖各项服务的明细情况、问题处理以及满意度方面的实际数据统计与分析等方面。11.项目服务人员在实施服务过程中，招标人有权监督检查，如发现问题，有权向中标人提出整改意见；中标人应在收到整改意见后三个工作日内将整改情况及配套管理制度等正式函招标人。中标人应有专人定期复盘分析，及时反馈服务过程出现的问题，有责任和义务提供投诉件的处理反馈报告，报告要求逐件反馈。12.项目管理团队人员要求（1）本项目管理团队人员至少涵盖项目经理、质量监控人员、培训辅导人员；（2）本项目管理团队人员中，至少提供1名本科（及以上）学历人员；（3）本项目管理团队人员中，至少1名具有中级经济师（管理类）或三级（及以上）人力资源管理师职称证书。（三）其他要求★1.保密承诺：投标人应承诺做好招标文件和投标文件中涉及用户方的各种信息的保密工作。（提供书面承诺函并加盖投标人公章）2.知识产权的范围及归属：投标人在其工作范围内应确保其各自独立准备的全部文件在中国境内外都没有且也不会侵犯任何第三方的知识产权（包括但不限于著作权、商标权、专利权）或专有技术或商业秘密；投标人如果在其文件中使用或包含任何其他人的知识产权或专有技术或商业秘密，应保证已经获得权利人的合法、有效、充分的授权；招标人拥有中标人所提交的全部文件（包括方案、成果）的使用权和收益权，并使用于招标项目。投标报价要求本项目控制价（最高限价）为850万元。2.投标人的单价报价须包括整个服务过程中的服务人员劳务费（包括但不限于应支付的人员工资，单位及个人社保：养老、医疗、工伤、生育险、失业保险，奖金、加班费用、福利补贴）、招聘服务费、劳务管理费、办公用品和耗材费用、税费等以及不可预见的一切费用。如果投标人在中标并签署合同后，在项目实施过程中出现任何遗漏，中标人需与招标人友好协商解决，非因招标人责任，招标人原则上不再另行支付任何费用。★3. 本项目需根据各级别人员单价基准价分别报出投标单价，报价单价不能超过各人员级别的单价基准价且报价为整数，否则按无效投标处理（如一级服务人员的报价必须为XXXX.00元，若报价为XXXX.15元，则按无效投标处理，其他人员级别报价同理）。本项目合同期内，所有各级别服务人员结算均适用于所报单价，即每月实际结算费用=∑[每月派出各级别人员数量×各级别人员报价单价×每月服务费用支付比例]。本次项目采用框架协议采购方式，采用三名供应商轮动机制，每月依据渠道需求量，向三家中标供应商动态分配合作需求。在供应商年底考核周期结束后，依据供应商考核得分重新评估并调整合作优先级顺序。投标人报价时应充分考虑以上风险及合同期内因人员工资、管理费用等成本上涨所带来的风险。一年合同期内，均按中标单价进行结算，中标单价在合同期内不作调整。三家中标人所获得的总份额不超过年度结算上限。★4.本次招标所列岗位工资总额（含奖金、福利补贴、加班费等）不低于项目团队各项年度费用预算的75%，本次招标所列岗位应包含以下福利项目：职工生日慰问品不低于200元/人/年；元旦、春节、劳动节、端午、中秋、国庆节节日慰问品不低于200元/人/次；职工年度体检不低于600元/人/年（仅部分人员需要，非全部人员）本项目将各服务人员岗位类别划分为一至八级服务人员，不同职级对应不同的工作要求与能力标准。详情如下：付款方式1.本项目费用按月支付。中标人每月在结算当月外包服务费后，向招标人提供上月服务明细表（包含对应员工的收入清单（银行支付的提交清单，支付现金提交签收表）及本项目员工购买社保凭证。招标人依据上月实际在岗人数等资料核定服务费用，审核无误后，中标人开具有效合法发票，招标人于收到发票的15个工作日内将上月费用通过银行转账支付给中标人。如遇法定节假日、休息日或特殊情况发生由招标人、中标人双方提前协商。 除另有约定外，因履行本合同产生的税费，全部由中标人承担。每月实际结算费用=∑[每月派出各级别人员数量×各级别人员报价单价×每月服务费用支付比例]。2.服务费用支付比例直接与招标人对中标人的服务质量考评得分挂钩，具体如下：（1）中标人外包服务满意度得分在60分（含）-100分，招标人按照外包服务满意度*100%*人员级别对应单价支付服务费用，即每月服务费用支付比例=外包服务满意度得分*100%。（2）中标人外包服务满意度得分在60分以下，招标人按照外包服务满意度得分*0%*人员级别对应单价进行支付。验收条款1.验收标准：在规定的时间内，按照需求完成相应阶段内所有服务内容、提交相应阶段内所有服务成果物。2.验收方式：招标人每月根据中标人每月实际派出服务人员的级别、人数、服务质量进行考评评分，评分标准详见附件1《外包服务满意度评分表》。附件2：保密条款/合同范本第  条  保密信息    （一）保密信息的范围在本合同签订前或履行过程中一方（以下简称“披露方”）向对方（以下简称“接收方”）披露的，或由于签订、履行本合同而产生的，或一方可合理判断出为对方机密或专有的任何信息，无论以何种形式或载于何种载体，无论是否有现时的或将来的经济利益，无论在披露或产生时是否以口头、图像或以书面方式表明其具有保密性，均视为保密信息。    1.保密信息包括但不限于以下内容：（1）商业秘密；（2）战略规划、经营策略、市场策略、竞争策略、价格策略，管理制度、管理方法、操作规范、运营流程，经营情况、财务状况、信息系统情况、客户服务情况，项目和产品信息、预测和分析、数据和指标等；（3）思路、构思、设计、创意、模式等；（4）作品、发明创造，无论前述内容的知识产权是否归合同一方享有，也无论前述内容是否已在政府知识产权管理部门申请权利、注册；（5）客户的姓名、住址、联系方式、证件号码、浏览痕迹、行为记录、购买记录、意向、习惯、偏好等信息（以下简称“客户信息”）；（6）本合同的条款。    2.以下信息不属于保密信息：    （1）某项信息被披露前，接收方已通过其他主体合法获取了该项信息，但其他主体非法掌握信息或对披露方就该项信息负有保密义务的除外；    （2）某项信息被披露前，接收方已自行推断、研究得出了该项信息，但前述推断、研究依赖于披露方已披露的其他信息的除外；（3）某项信息被披露前或被披露后，接收方可从公开渠道直接获取该项信息，但由于可归咎于接收方的原因而导致信息进入公开领域的除外。（二）通用条款    1.保密信息的披露（1）除双方另有约定或法律法规有规定之外，双方不得将保密信息向第三方（本条款【注：如为保密合同，则此处应调整为“合同”】中的“第三方”，均指除甲乙双方之外的任何自然人、法人或非法人组织，包括但不限于甲乙双方关联公司、顾问、合作方等）披露；（2）双方可向各自员工披露保密信息，但该员工须是为签订或履行本合同而必须知晓保密信息的员工，且向其披露的保密信息仅限于与其职责相应的部分；（3）对于为签订或履行本合同而必须知晓保密信息的第三方，或法律法规规定应向其披露保密信息的第三方（司法机关、行政机关、仲裁机构除外），一方可向其披露与其职责相应的保密信息，但披露前应向该第三方书面告知披露的信息为商业秘密，并应取得第三方将按不低于本合同约定的程度履行保密义务的书面承诺，该书面承诺应向甲乙双方作出；（4）第三方为司法机关、行政机关、仲裁机构的，一方可依照法律法规规定或为自己作为参与人的诉讼、仲裁的目的向该第三方披露保密信息，但披露前应向该第三方书面告知披露的信息为商业秘密，且应要求诉讼、仲裁非公开进行，判决书、裁决书不公开；接收方须及时就前述披露事先向披露方发出书面通知，并应配合披露方采取适当和有效的措施以依法避免或限制对保密信息的披露。2.保密信息的使用（1）在向符合本合同约定的人员披露保密信息的前提下，双方仅可为履行本合同的目的，或在本合同约定的用途内使用保密信息，不得将保密信息用于本合同之外的目的或其他用途；（2）双方应在满足履行本合同需求的基础上，最小限度地使用保密信息。3.保密信息的保护（1）双方应采取有效的制度、措施、技术手段等保护保密信息，应至少保证保密信息不被不符合本合同约定的人员接触，如其保护自身类似性质信息的程度高于前述约定的，应按照该程度执行，如法律、法规、规章等对保护措施、保护方式等有要求且该要求高于前述程度的，应遵照该要求执行；（2）如参与本合同签订、履行的乙方员工可能加入与甲方存在直接竞争的企业，则乙方知道或应当知道前述可能时，应立即终止该员工获得保密信息的途径；（3）参与本合同签订、履行的乙方员工离职时，乙方应要求该员工按不低于本合同约定的程度履行保密义务，如该员工离职后将保密信息向第三方披露，乙方应就由此而给甲方造成损失承担全部责任，并对甲方进行赔偿；（4）对于一方披露的保密信息，在应披露方的要求、不再需要使用或本合同终止后，其原始载体及全部复制件（含存储介质）、复印件等，应在披露方的监督下被销毁或归还披露方，并应提供书面确认文件（接收方签字并盖章）以证明保密信息的原始载体及全部复制件（含存储介质）、复印件等已全部返还或销毁，接收方不得再直接或间接持有任何保密信息；（5）对于履行本合同而产生的保密信息，其处理方式由双方在本合同中约定，无约定的，由双方另行协商确定，协商不成的，以甲方意见为准。4.保密义务及相关责任的承担（1）双方均负有保密义务，但如保密信息为合同标的，标的交付后，标的提供方负有保密义务，标的接受方不负保密义务；如标的为双方共同开发、研究，则标的最终归属方不负保密义务，对方负有保密义务，如标的归双方共同所有，则双方均负有保密义务，本合同另有约定的除外；（2）甲方认为保密信息泄露时，乙方应证明其已按本合同的约定履行对保密信息的披露、使用、保护义务，否则视同未按约定履行，应承担违约责任；（3）乙方认为其向甲方披露的保密信息泄露时，甲方应证明其已按本合同的约定履行对保密信息的披露、使用、保护义务，否则视同未按约定履行，应承担违约责任；（4）一方向第三方提供保密信息，第三方造成保密信息泄露的，该提供方应承担违约责任。（三）知识产权特别约定对于涉及知识产权的保密信息，双方除通用条款外，还应遵守如下约定，但本合同另有约定的除外：1.任何一方不得对保密信息或其衍生的内容申请注册或申请授予权利；2.任何一方不得对另一方披露的保密信息进行任何修改、反向工程、二次开发、试图进行破译、编译或有其他类似行为，或以保密信息为基础制作、销售、使用衍生品；否则，由此产生的所有知识产权等权利及所有收益、利益均归保密信息披露方所有，同时该等披露方有权终止本合同，并追究另一方的责任。    （四）客户信息特别约定对于客户信息，双方应遵守通用条款，但以下约定为例外：甲方可自行使用客户信息作推销之用，并可在其集团成员单位，即中国人寿保险（集团）公司及其关联方之间共享并作推销之用，乙方应保证其将客户信息提供给甲方、集团成员单位并作前述用途的行为已取得客户完全、真实、合法的授权，如客户撤销前述授权或乙方依据中国法律法规或行政命令或司法判决/裁定需要销毁相关客户信息的，乙方应于当日书面通知甲方。对因甲方或集团成员单位按照前述约定用途使用客户信息而产生的或与之有关的所有主张、索赔、诉讼、损失、费用等，乙方将为甲方、集团成员单位进行抗辩和补偿，并使其免遭损失。（五）保密条款的效力在本合同部分或全部终止、被撤销或被确认无效后，本保密条款继续有效，负有保密义务的一方或双方仍应按照本合同的相关约定继续履行保密义务。投标须知前附表投  标  须  知总   则说明本招标文件适用于本投标邀请函中所述项目的招标项目。资金来源：详见《投标须知前附表》。定义“招标人”是指：详见《投标须知前附表》。“招标代理机构”是指：广东国科招标有限公司。合格的投标人 2.3.1合格投标人的条件详见《投标邀请函》的“投标人资格要求”。“中标人”是指经法定程序确定并授予合同的投标人。“甲方”是指招标人。“乙方”是指中标人。遵循原则遵循公开、公平、公正和诚实信用的原则。合格的货物和服务“货物”是指投标人制造或组织符合招标文件要求的货物等。投标的货物必须是其合法生产的符合国家有关标准要求的货物，并满足招标文件规定的规格、参数、质量、价格、有效期、售后服务等要求。“服务”是指除货物和工程以外的其他采购对象，其中包括：投标人须承担的运输、安装、技术支持、培训以及招标文件规定的其它服务。投标费用投标人应承担所有与准备和参加投标有关的费用。不论投标的结果如何，招标代理机构和招标人均无义务和责任承担这些费用。招标代理服务费本次招标代理服务费由《投标须知前附表》中所述的交纳人及交纳金额向招标代理机构一次性交纳。招标代理服务费币种：人民币。知识产权投标人必须保证，招标人在中华人民共和国境内使用投标货物、资料、技术、服务或其任何一部分时，享有不受限制的无偿使用权，如有第三方向招标人提出侵犯其专利权、商标权或其它知识产权的主张，该责任应由投标人承担。投标报价应包含所有应向所有权人支付的专利权、商标权或其它知识产权的一切相关费用。系统软件、通用软件必须是具有在中国境内的合法使用权或版权的正版软件，涉及到第三方提出侵权或知识产权的起诉及支付版税等费用由投标人承担所有责任及费用。纪律与保密事项投标人不得相互串通投标报价，不得妨碍其他投标人的公平竞争，不得损害招标人或其他投标人的合法权益，投标人不得以向招标人、评标委员会成员行贿或者采取其他不正当手段谋取中标。在确定中标人之前，投标人不得与招标人就投标价格、投标方案等实质性内容进行谈判，也不得私下接触评标委员会成员。在确定中标人之前，投标人试图在投标文件审查、澄清、比较和评价时对评标委员会、招标人和招标代理机构施加任何影响都可能导致其投标无效。获得本招标文件者，不得将招标文件用作本次投标以外的任何用途。如有要求，开标后，投标人应归还招标文件中的保密文件和资料。由招标人向投标人提供的图纸、详细资料、样品、模型、模件和所有其它资料，均为保密资料，仅被用于它所规定的用途。除非得到招标人的同意，不能向任何第三方透露。开标结束后，应招标人要求，投标人应归还所有从招标人处获得的保密资料。关于关联企业与招标人存在利害关系可能影响招标公正性的法人、其他组织或者个人，不得参加投标。单位负责人为同一人或者存在控股、管理关系的不同单位，不得参加同一标段投标或者未划分标段的同一招标项目投标。招标文件的澄清或修改文件发出时间招标人或者招标代理机构可以对已发出的招标文件进行必要的澄清或者修改。澄清或者修改的内容可能影响投标文件编制的，招标人或者招标代理机构应当在投标截止时间至少15日前，不足15日的，招标人或者招标代理机构应当顺延提交投标文件的截止时间。澄清或修改后的内容是招标文件的组成部分，招标代理机构将在招标代理机构网站等媒体上发布澄清或修改公告和以书面形式通知所有获取招标文件的潜在投标人，并对潜在投标人具有约束力。潜在投标人在收到上述通知后，应立即以书面形式向招标代理机构确认（加盖单位公章，传真有效）。投标人如在24小时内无书面回复则被视为同意澄清、补充、修改文件内容。关于分公司投标分公司投标的，需提供具有法人资格的总公司的营业执照副本复印件及授权书，授权书须加盖总公司公章。总公司可就本项目或此类项目在一定范围或时间内出具授权书。已由总公司授权的，总公司取得的相关资质证书对分公司有效，法律法规或者行业另有规定的除外。踏勘现场投标人应按《投标须知前附表》所述时间和要求对项目现场进行踏勘或自行对项目现场进行踏勘。投标人对项目现场及周围环境进行踏勘，投标人应充分重视和仔细地进行这种考察，以便投标人获取那些须投标人自己负责的有关编制投标文件和签署合同所涉及现场所有的资料。一旦中标，这种考察即被认为其结果已在中标文件中得到充分反映。考察现场的费用由投标人自己承担。招标人若向投标人提供的有关现场的数据和资料，是招标人现有的能被投标人利用的资料，招标人对投标人做出的任何推论、理解和结论均不负责任。经招标人允许，投标人可为踏勘目的进入招标人的项目现场。在考察过程中，投标人及其代表必须承担那些进入现场后，由于他们的行为所造成的人身伤害（不管是否致命）、财产损失或损坏，以及其他任何原因造成的损失、损坏或费用。投标人不得因此使招标人承担有关的责任和蒙受损失。招 标 文 件招标文件的组成招标文件包括：第一章  投标邀请函第二章  采购需求第三章  投标须知第四章  合同书格式第五章  投标文件格式其  它  在招标过程中由招标代理机构发出的澄清、修正和补充文件等。投标人应认真阅读、并充分理解招标文件的全部内容（包括所有澄清、补充、修改内容、重要事项、格式、条款和技术规范、参数及要求等）。投标人没有按照招标文件的要求提交全部资料，或者投标文件没有对招标文件在各方面做出实质性响应是投标人的风险，有可能导致其投标被拒绝，或被认定为无效投标或被确定为投标无效。招标文件的澄清及答疑任何要求对招标文件有异议的投标人，均应以书面形式在投标截止时间十日以前通知招标代理机构。招标代理机构将组织招标人对投标人所要求澄清的内容均以书面形式予以答复。必要时，招标代理机构将组织相关专家召开答疑会，并将会议内容以书面的形式发给每个购买招标文件的潜在投标人（答复中不包括问题的来源）。或根据需要，招标代理机构和招标人可组织相关专家在《投标须知前附表》规定的时间和地点召开投标答疑会，解答投标人在此之前以书面或当场提出的对招标文件的澄清要求，或以书面函件形式通知购买了招标文件的投标人。答疑或澄清文件作为招标文件的组成部分，如与招标文件的内容不一致的，以答疑或澄清文件最后发出的书面文件为准。投标人在规定的时间内未对招标文件澄清或提出疑问的，招标代理机构将视其为无异议。对招标文件中描述有歧义或前后不一致的地方，评标委员会有权进行评判，但对同一条款的评判应适用于每个投标人。投标文件的编制和数量投标语言和计量单位投标人提交的投标文件以及投标人与招标代理机构就有关投标的所有来往函电均应使用中文。投标人提交的支持文件或印刷的资料可以用另一种语言，但相应内容应附有中文翻译本，在解释投标文件的修改内容时以中文翻译本为准。对中文翻译有异议的，以权威机构的译本为准。投标文件中所使用的计量单位除招标文件中有特殊规定外，一律使用国际公制单位。投标文件的构成投标文件的构成应符合法律法规及招标文件的要求。投标人编排投标文件应包括投标文件格式要求的所有内容以及招标文件要求提供的内容。投标文件的编写投标人须对本项目以采购包为单位整体投标，任何只对某采购包其中一部分标的进行的投标都被视为无效投标或被确定为投标无效。投标人对招标文件中多个采购包进行投标的，其投标文件的编制应按每个采购包的要求分别装订和封装。如果《投标须知前附表》有特别要求的按照其要求进行编制。投标人应当对投标文件进行装订，对未经装订的投标文件可能发生的文件散落或缺损，由此产生的后果由投标人承担。投标人应完整、真实、准确的填写招标文件中规定的所有内容。投标人必须对投标文件所提供的全部资料的真实性承担法律责任，并无条件接受招标代理机构及招标人等对其中任何资料进行核实的要求。投标人必须对投标文件所提供的全部资料的真实性承担法律责任。如果因为投标人投标文件填报的内容不详，或没有提供招标文件中所要求的全部资料及数据，由此造成的后果，其责任由投标人承担。投标报价投标人所提供的货物和服务均应按照第二章采购需求要求的“投标报价说明”进行报价。投标人应按照《开标一览表》和《投标分项报价表》确定的格式报出总价和分项价格。投标总价中不得包含招标文件要求以外的内容，否则，在评标时不予核减。投标总价中也不得缺漏招标文件所要求的内容，否则，其投标将可能被视为无效投标或确定为投标无效。投标报价填写时应响应下列要求：所有根据合同或其它原因应由投标人支付的税款和其它应交纳的费用都要包括在投标人提交的投标价格中；应包含货物的制造、至最终目的地的运输、保险和伴随货物服务的其他所有费用；每一种规格的货物只允许有一个报价，否则将被视为无效投标。备选方案只允许投标人有一个投标方案，否则将被视为无效投标。《投标须知前附表》允许有备选方案的除外。联合体投标如果《投标须知前附表》允许投标人为联合体，联合体各方均必须具有独立承担民事责任的能力。投标人须提交联合体各方的资格证明文件、联合体协议并注明主体方及各方拟承担的工作和责任。联合体投标文件由联合体各方或主体方盖章，否则，将导致其投标无效。联合体各方不得再单独参加或者与其他投标人另外组成联合体参加同一合同项下的招标活动。联合体中有同类资质的投标人按照联合体分工承担相同工作的，按照资质等级较低的投标人确定资质等级。联合体投标的，可以由联合体中的一方或者共同提交投标保证金，以一方名义提交投标保证金的，对联合体各方均具有约束力。联合体中标的，联合体各方应当共同与招标人签订合同。组成联合体投标的按相关法律、法规、规章等有关规定执行。投标人资格证明文件投标人应按招标文件的要求，提交证明其有资格参加投标和中标后有履行合同能力的文件，并作为其投标文件的组成部分，如果投标人为联合体，应提交联合体各方的资格证明文件、共同投标协议并注明主体方及各方拟承担的工作和责任。否则，将导致其投标无效。投标人提交的资格证明文件应证明其满足本须知定义的合格投标人。投标保证金投标人应按招标文件规定的金额和期限交纳投标保证金，投标保证金作为投标文件的组成部分。投标人与交款人名称必须一致，非投标人缴纳的投标保证金无效。投标保证金交纳形式：转账或者金融机构、担保机构出具的保函等非现金形式提交。投标保证金交纳时间：须在投标截止时间前到达招标代理机构账户（以银行到账时间为准）。投标人应向招标代理机构提交投标保证金，金额见《投标须知前附表》。 投标保证金应为人民币，可以选择下列方式中任何一种，投标保证金交纳凭证复印件装入信封密封提交：从投标人账户将投标保证金转入或汇入以下账户：开户名称：广东国科招标有限公司开户银行及账号：见《投标须知前附表》。1）投标人汇缴保证金时应按采购包（如有）汇缴，并按招标文件规定的保证金金额汇缴。2）汇缴时务必在汇款单备注上标注项目编号和采购包（如有）。用“保函”形式提交的：“保函”投标截至时间前1天提交，招标代理机构审核其内容、格式等是否符合规定；在投标时提供有效的“保函”复印件，作为投标文件的组成部分之一。投标担保函有效期应覆盖投标有效期。投标人未按照招标文件要求提交投标保证金的，投标无效。如无异议或投诉，未中标的投标人保证金，在中标通知书发出之日起五日内原额退还；如有异议或投诉，将在异议和投诉处理完毕后原额退还。中标人的投标保证金,在中标人与招标人签订合同之日起五日内原额退还。下列任何情况发生时，投标保证金将不予退还： （1）投标人在投标截止后撤销投标文件的；（2）投标人在投标文件中提供虚假的文件和材料，意图骗取中标的；（3）中标人未能在规定期限内提交履约保证金或签订合同协议；（4）中标人未按规定交付招标代理服务费；（5）招标文件中其他规定。投标的截止时间、投标有效期投标的截止时间为第一部分《投标邀请函》中规定时间，超过截止时间后的投标为无效投标，招标代理机构将拒收。从投标截止日起，投标有效期为《投标须知前附表》规定天数。在特殊情况下，招标代理机构可于投标有效期满之前要求投标人同意延长有效期，要求与答复均应以书面形式。投标人可以拒绝上述要求而其投标保证金不被没收，同意延期的投标人在原投标有效期内应享之权利及应负之责任也相应延续。投标文件的数量和签署投标人应编制投标文件的数量见《投标须知前附表》规定，投标文件的副本可采用正本的复印件。每套投标文件须清楚地标明“正本”、“副本”。若副本与正本不符，以正本为准。投标文件正本必须用计算机打印。投标文件要求签名的均必须用黑色墨水填写，并由法定代表人或其正式授权的代表签字并加盖投标人公章。法定代表人授权代表须以书面形式出具“法定代表人授权委托书”附在投标文件中。投标文件一般不得涂改和增删，除对差错处做必要修改外，不得行间插字、涂改或增删，如有上述改动，必须由法定代表人或授权代表签字并加盖投标人公章。若为联合体的，除“联合体协议书”外，投标文件的其它内容可由联合体主体方进行签署即可。投标文件应编制目录，并有页码。投标文件的递交投标文件的密封和标记投标人应将投标文件正本和所有的副本密封包装，并在外包装上清晰标明“正本”、“副本”字样。对投标文件投递的要求所有投标文件应于第一部分《投标邀请函》中规定的投标截止时间前递交到招标代理机构。投标文件的递交须由投标人代表签名确认。所有投标文件必须装在密封完好的信封。投标文件的正本和副本应分别封装，并在每一信封或包装的封面上写明：投标文件的修改和撤回投标人在投标截止时间前，可以对所递交的投标文件进行补充、修改或者撤回，并书面通知招标代理机构。补充、修改的内容应当按招标文件要求签署、盖章，并作为投标文件的组成部分。在投标截止时间之后，投标人不得对其投标文件做任何修改和补充。招标代理机构不接受电报、电话、电传、传真等形式的投标。投标人在递交投标文件后，可以撤回其投标，但投标人必须在规定的投标截止时间前以书面形式告知招标代理机构。投标人所提交的投标文件在评标结束后，无论中标与否都不退还。招标代理机构对不可抗力事件所造成投标文件的损坏、丢失不承担任何责任。投标样品本项目如要求提交投标样品的，招标代理机构在收取样品时没有对样品外观进行验收及性能测试，对样品的破损或质量概不负责。由于招标代理机构存放样品的空间有限，如招标人无需留存样品的情况下，请各有关投标人收到招标代理机构的投标样品退还通知后7日内取回，否则视同投标人不再认领，招标代理机构有权进行处理。投标文件的拒收投标文件有下列情形之一的，招标代理机构拒绝收取投标文件：（1）在超过投标截止时间送达的或未送达指定地点的；（2）投标文件未密封。开标、评标定标开标招标代理机构在《投标邀请函》中规定的日期、时间和地点组织公开开标。开标时原则上应当有招标人代表和投标人代表参加。参加开标的代表应签到以证明其出席。开标时，由投标人或投标人的推选代表检查投标文件的密封情况，也可以由招标人委托的机构检查并见证，经确认无误后由招标工作人员当众拆封，宣读投标人名称、投标价格、价格折扣、投标文件的其他主要内容和招标文件允许提供的备选投标方案。在开标时，未宣读的投标价格和招标文件允许提供的备选投标方案等实质内容，评标时不予承认。招标代理机构将做开标记录，开标记录由各投标人签字确认。投标人未参加开标的，视同认可开标结果。评标过程的保密性从开标到签订合同，凡与审查、澄清、评审和投标有关的资料以及定标意见相关的事项，参与招投标的有关人员均不得向投标人及与评标无关的其他人透露。招标人应采取必要的措施，保证评标在严格保密的情况下进行。任何单位和个人不得非法干预、影响评标的过程和结果。评标委员会的组成和评标方法评标由招标代理机构依照法律、法规、规章、政策的规定，组建的评标委员会负责。评标委员会成员由招标人代表和（技术、经济等）方面的评审专家组成。评标委员会将按照招标文件确定的评标方法进行评标。评标委员会或者与评标活动有关的工作人员不得泄露有关投标文件的评审和比较、中标候选人的推荐以及与评标有关的其他情况。有下列情形之一的，不得担任评标委员会成员：（1）投标人或者投标主要负责人的近亲属；（2）项目主管部门或者行政监督部门的人员；（3）与投标人有经济利益关系，可能影响对投标公正评审的；（4）曾因在招标、评标以及其他与招标投标有关活动从事违法行为而受过行政处罚或刑事处罚的。评标委员会成员有前款规定情形之一的，应当主动提出回避。评标方法、步骤及标准评标方法本次评标采用综合评分法。本次评标是以招标文件为依据，遵循公开、公平、公正和诚实信用原则。评标步骤评标委员会先进行初步评审，再进行商务、服务及价格的详细评审。只有通过初步评审的投标人才能进入详细的评审。最后评标委员会出具评标报告，并排序推荐第一中标候选人组和第二中标候选人组。评分及其统计按照评标程序、评分标准以及权重分配的规定，评标委员会各成员分别就各个投标人的商务、服务状况及其对招标文件要求的响应情况进行评议和比较，评出其商务评分和服务评分。各评委的商务评分和服务评分的算术平均值即为该投标人的商务和服务评分（分值按四舍五入法取小数点后两位）。然后，评出投标人的价格评分（分值按四舍五入法取小数点后两位）。将各投标人的商务评分、服务评分和价格评分相加得出其综合得分。根据综合得分排序确定中标候选人组，如下表：初步评审评标委员会按照以下《初步评审表》内容对投标文件进行资格性检查及符合性审查，只有对《初步评审表》所列各项内容全部作出实质性响应的投标文件才能通过初步评审。对是否实质性响应《初步评审表》所列各项内容有争议的投标文件，评标委员按照少数服从多数的原则以记名方式进行投票表决，只有得票超过半数的投标文件才有资格进入下一阶段的详细评审，否则认定为无效投标。初步评审表在详细评标之前，评标委员会要审查每份投标文件是否实质上响应了招标文件的要求。实质上响应的投标文件应该是与招标文件要求的关键条款、条件和规格相符没有实质偏离的投标文件。评标委员会决定投标文件的响应程度只依据投标文件本身的真实无误的内容，而不依据外部的证据。但投标文件有不真实、不正确内容的除外。评标委员会认为，投标人的报价明显不合理或者明显低于其他投标报价，有可能影响商品质量和不能诚信履约的，应当要求该投标人作出书面说明并提供相关证明材料。投标人不能合理说明或者不能提供相关证明材料的，由评标委员会认定该投标人以低于成本报价竞标，投标无效。如果通过初步评审的投标人不够3家，本次招标失败。详细评审详细评审是对通过初步评审的投标文件进行商务、服务和价格的评审。分值（权重）分配评分总值最高为100分，商务、服务及投标报价得分分值（权重）分配：分值设置如下：商务评分：评标委员会就各投标文件对商务评审内容的各项要求进行评分，评审的具体内容见《商务评审表》：商务评审表服务评分：评标委员会就各投标人对服务评审内容的各项要求进行评分，评审的具体内容见《服务评审表》。服务评审表投标报价得分（20分）：34.5.1评标时，投标文件中开标一览表内容与投标文件中相应内容不一致的，以开标一览表为准；投标文件中的大写金额和小写金额不一致的，以大写金额为准；单价金额小数点有明显错位的，应以总价为准，并修改单价；总价金额与按单价汇总金额不一致的，以单价金额计算结果为准；对不同文字文本投标文件的解释发生异议的，以中文文本为准。修正后的报价采用书面形式，加盖投标人公章，或者由投标人法定代表人或其授权的代表签字，经投标人确认后产生约束力，投标人不确认的，其投标无效。34.5.2评标价的确定：按上述条款的原则校核修正后的价格为评标价。34.5.3价格分统一采用低价优先法计算，即满足招标文件要求的各评标价(各级别人员报价单价)中取最低的为评标基准价，其价格分为满分。价格分计算公式：各人员级别报价得分=【评标基准价／评标价】×价格分值×100%投标文件的澄清评标期间，对投标文件中含义不明确、同类问题表述不一致或者有明显文字和计算错误的内容，评标委员会可以书面形式（应当由评标委员会专家签字）要求投标人作出必要的澄清、说明或者纠正，但不得允许投标人对 投标报价等实质性内容做任何更改。投标人的澄清、说明或者补正应当采用书面形式，由其授权的代表签字，并不得超出投标文件的范围或者改变投标文件的实质性内容。有关澄清的答复均应由投标人的法定代表人或授权代表签字的书面形式作出。投标人的澄清文件是其投标文件的组成部分。投标的评价评标委员会只对确定为实质上响应招标文件要求的投标文件进行评价和比较。授标评标委员会按照招标文件确定的评标方法、步骤、标准，对投标文件进行评审，提出书面评审报告。采用综合评分法的，按评审后得分由高到低顺序排列。综合得分相同的，名次按投标报价由低到高顺序排列；综合得分相同，且投标报价相同的，名次按服务评分由高到低顺序排列；如以上都相同的，名次由评标委员会抽签确定。按《投标须知前附表》的规定中标候选人组。招标人应当自收到评审报告之日起3日内确认并公示中标候选人，公示时间不少于3日。替补候选人的设定与使用第一中标候选人组内的中标候选人放弃中标、或因不可抗力提出不能履行合同、或者招标文件规定应当递交履约担保而在规定的期限内未能递交、或中标人拒绝与招标人签订合同的，招标人可以按照评审报告推荐的中标候选人名单排序，确定下一候选人为中标人，也可以重新开展招标活动。异议异议与答复\_投标人或者其他利害关系人对项目的评标结果有异议的，应当在中标候选人公示期间以书面形式一次性向招标代理机构提出，异议者异议应当有明确的请求和必要的证明材料，逾期异议无效。异议函应当署名。异议者为自然人的，应当由本人签字；异议者为法人或者其他组织的，应当由法定代表人或者投标人授权代表签字并加盖公章。异议函应写明联系人及联系方式，且异议内容不得含有虚假、恶意成份。依照谁主张谁举证的原则，提出异议者必须同时提交相关确凿的证据材料和注明证据的确切来源，证据来源必须合法，招标代理机构有权将异议函转发异议事项各关联方，请其作出解释说明。对捏造事实、滥用维权扰乱招标秩序的恶意异议者，将上报相关部门依法处理。合同的订立和履行合同的订立在合同签订前，中标人须提供营业执照、组织机构代码证、税务登记证（已实行“三证合一”的单位，只须提供新版营业执照即可）和在投标文件中提供的资质证明文件、业绩合同等主要证明文件（如授权其分支机构进行项目实施或提供售后服务的，亦应提供其与分支机构关系的法律证明材料）的原件给招标人进行核对。招标人与中标人自中标通知书发出之日起三十日内，按招标文件要求和中标人投标文件承诺签订合同，但不得超出招标文件和中标人投标文件的范围、也不得再行订立背离合同实质性内容的其他协议。合同的履行合同订立后，合同各方不得擅自变更、中止或者终止合同。中标人放弃中标或拒签合同或不履行合同的，招标人（招标代理）有权没收该项目的投标保证金并且不予以退还招标代理服务费。参照法律参照《中华人民共和国招标投标法》及《中华人民共和国招标投标法实施条例》及其配套的法规、规章、政策。（合同格式为合同的参考文本，合同签订双方可根据项目的具体要求进行修订）劳务外包服务合同甲     方：工商登记号：联系地址：邮政编码：联系电话：电子邮箱：联 系 人：              手机号：乙     方： 工商登记号：联系地址：邮政编码：联系电话：电子邮箱：联 系 人：              手机号：甲方因部分岗位需要，决定委托乙方提供劳务外包服务。双方就劳务外包合作相关事宜，依据有关法律法规，经友好协商一致，签订本合同：服务事项乙方接受甲方委托，提供营销运营服务或业务咨询服务，服务事项具体内容包括：乙方根据甲方要求安排人员到指定场所提供以下服务：由乙方安排人员，根据甲方分配的具体项目需要，完成业务相关服务及客户服务，工作内容包括但不限于续保提醒、渠道开发拜访、画像定位、话术设计与优化、团队管理与培训、产品/服务讲解、增值服务满意度回访、售后跟进。二、甲方权利及义务1、提供乙方技术服务所需的场地、相关设备及用电，有权对乙方的服务事项作出明确、清晰、合理的要求。2、根据便利需要原则，甲方可要求乙方工作人员佩戴甲方或乙方的标识。3、如乙方无法达到甲方所期待的通常标准（包括完成期限），经双方评估确认后，乙方应撤回或更换人员。4、甲方有权监督、指导服务事项进展，并提出改进意见。5、在本合同期内，如甲方要求直接与乙方工作人员订立劳动合同，需经乙方同意。乙方工作人员同意并向乙方辞职后，甲方可以直接与该工作人员订立劳动合同。因甲方聘用乙方工作人员而导致乙方无法或延迟完成本合同项下的技术服务的，乙方不承担任何责任。6、甲方应当指定相关负责人按照甲乙双方的约定对乙方完成的技术服务工作进行审核和确认。7、甲方应当按时足额向乙方支付服务费及双方约定的其他费用。三、乙方权利及义务　1、乙方应当根据甲乙双方的约定在服务项目开始前确定适当的工作人员承担服务工作，并保证服务事项如期开展。2、乙方应于人员派驻前3个工作日向甲方提交服务人员的职业资格证书、学历证书、健康证明及无犯罪记录证明，经甲方书面确认后方可上岗。3、乙方应当按照甲方要求提供服务，并按照双方约定的时间周期定期向甲方报告服务工作进展情况。4、乙方应当按照甲方对乙方完成服务事项的验收情况，及时做出工作调整。5、乙方对所提供的服务事项行使必要的管理权，但该管理权的行使不得违背甲方商业利益，且不得违反甲方对完成本合同服务事务的要求。甲方有权对乙方的管理行为进行监督、纠正或否决，乙方应无条件配合甲方的合理指令。6、乙方工作人员与甲方不具有任何劳动、劳务、雇用等法律关系，所发生的劳动（务）纠纷、病残、伤亡事故由乙方自行处理。乙方需对其工作人员失职给甲方造成的损失承担赔偿责任。7、乙方为完成服务事项，确需变更甲方服务要求的，应当经过甲方书面同意。四、服务方式本合同岗位外包人员为全日制用工方式。乙方安排人员常驻甲方，或者接到甲方通知1小时内安排人员上门服务。常驻人员需通过甲方组织的岗前能力测试，未通过者甲方有权要求更换。每日考勤记录由甲方主管人员据实统计，作为费用结算及考勤争议的唯一依据。甲方有新增岗位需求的，应提前告知乙方，双方以书面形式确认。甲方应与乙方明确岗位内容及岗位要求，并以书面形式确认。根据甲方的岗位要求，双方选用项目人员，经双方共同确认的，由乙方办理合法的劳动用工手续。服务地点经双方共同确认，任何一方不得单方改变服务地点。如甲方因业务需要临时调整岗位或服务地点，甲方提前   天通知乙方的，乙方应予以配合，双方应以书面形式确认调整内容，乙方不得无故拒绝。乙方应配合完成必要的人员调配，不得以服务地点变更为由拒绝履行合同义务。服务费用根据所需要求，将各服务人员岗位类别划分为一至八级服务人员，不同职级对应不同的工作要求与能力标准。服务费用为甲方购买乙方提供的本合同项下服务所发生的费用，除服务费用外，甲方无须就本协议项下乙方的任何义务支付任何额外费用。甲乙双方根据乙方每月实际派出服务人员的级别、人数、服务质量考评评分为依据进行结算。如期间乙方发生服务质量未达甲方要求或质量事故，甲方有权根据自身考评结果决定扣减相应服务费用，乙方不得以评分争议为由拒绝履行其他合同义务，否则视为乙方违约。其中服务费用支付比例直接与甲方对乙方的服务质量考评得分挂钩，具体如下：（1）乙方外包服务满意度得分在60分（含）-100分，甲方按照外包服务满意度得分*100%*人员级别对应单价支付服务费用，即每月服务费用支付比例=外包服务满意度得分*100%。（2）乙方外包服务满意度得分在60分以下，甲方按照外包服务满意度*0%*人员级别对应单价进行支付。本项目费用按月支付。乙方每月在结算当月外包服务费后，向甲方提供上月服务明细表（包含对应员工的收入清单（银行支付的提交清单，支付现金提交签收表）及本项目员工购买社保凭证。甲方依据上月实际在岗人数等资料核定服务费用，审核无误后，乙方开具有效合法发票，甲方于收到发票的15个工作日内将上月费用通过银行转账支付给乙方。如遇法定节假日、休息日或特殊情况发生由甲方、乙方双方提前协商。 除另有约定外，因履行本合同产生的税费，全部由乙方承担。乙方未及时开具或发票存在不合规情形，甲方有权暂停付款直至乙方补正完毕，且不视为违约。户名：银行： 账号： 六、其他约定1、甲乙双方对本合同的内容，以及在本合同履行过程中获得的对方的信息，均负有保密义务。除甲乙双方另有约定外，保密信息包括但不限于本合同报价、合同文本、以及双方标有保密字样的往来文件。除甲乙双方另有约定外，保密义务是指在未经对方事前书面同意前，一方不得将保密信息用于任何与履行本合同无关的情况；或以任何形式向任何第三方泄漏。双方的保密义务在本合同终止或解除后仍持续有效，存续期为合同终止或解除后五年。双方均有义务尽其一切努力防止任何第三方窃取秘密信息。由于任何一方违反以上保密义务给对方造成损失，违约方对受损失方负有停止侵害、消除影响、赔偿损失的责任。乙方承诺不得向甲方员工提供任何形式的商业贿赂，否则甲方有权立即解除合同并追偿损失。 乙方处理甲方客户数据应遵守《个人信息保护法》，建立数据安全管理制度，发生数据泄露应在24小时内书面通知甲方。 保密义务持续至合同终止后一年，但涉及商业秘密的应持续至相关信息进入公知领域。2、任何一方存在实质性违约行为（包括但不限于乙方连续两月服务质量得分低于60分、泄露保密信息；），另一方有权立即解除本合同；乙方未按约定更换不合格人员、甲方逾期付款超过30日经书面催告后10日内仍未履行的，另一方有权立即解除本合同。七、通知与送达1、双方之间的任何通知及通讯应以书面形式，以中文的形式通过短信、微信、传真、电子邮件、专人派送（包括快递）或挂号邮件等方式送达至甲方及乙方的地址及联系人（具体见本合同首部）。电子数据发出24小时后视为送达，邮寄3天后视为送达。2、如遇双方或一方联系人不能履行本合同的义务，双方或对方应及时沟通和更换联系人。如一方联系方式发生变更，应提前书面通知对方，否则由未及时通知方承担由此产生的不利后果。3、通知或通讯被认定的送达时间应按如下规定：1）如为传真或电子邮件，则应以传送记录或电脑所显示的进入时间为准。除非传送时间为该日下午五时之后，则送达日期应认定为在接收地的下一个工作日；2）若为专人派送（包括特快专递方式派送），以收件之日期为准。八、合同期限本合同期限自    年    月     日至    年    月     日。本合同有效期间，甲方不再需要乙方提供本合同约定的服务，提前15个工作日书面通知乙方，可以解除本合同，甲方无需支付乙方违约金和其他任何赔偿费用。本合同到期时，如果甲方仍然有需要乙方提供本合同约定的服务的项目时，本合同自动延续到乙方所提供服务的项目结束时终止。    合同解除或终止后过渡期条款：合同解除或终止后10日内，乙方应完成全部资料交接、人员撤离，每逾期一日按当月服务费1%支付违约金。 合同终止后30日内，若甲方提前提出要求的，乙方应继续提供过渡服务，甲方按实际服务和原约定标准支付费用。九、争议解决基于本合同的任何争议发生，甲乙双方应协商解决。经协商不能解决的，可向甲方所在地人民法院裁决。十、合同附件本合同附件包括：附件一 外包服务费用结算单附件二 外包服务满意度评分表十一、其他1、本合同在履行中，如政府新颁布的有关法律、法规和提供服务的地区的规定与本合同条款发生矛盾时，甲乙双方应当协商变更相应条款，以达符合相关规范要求之目的。2、本合同的附件及双方认同的操作流程和规范均为本合同的补充，是本合同不可分割的部分，与本合同具有同等法律效力。3、本合同执行过程中双方均应认真遵守执行，不得擅自变更、修改。如双方同意对本合同进行修改应以补充协议的形式作为本合同附件。4、本合同一式两份，甲、乙双方各执一份，具体同等的法律效力。甲方（盖章） \t\t\t             乙方（盖章）                       授权代表签字：_____________       授权代表签字：___________________签署日期：                        签署日期：附件一：外包服务费用结算单附件二：投 标 文 件（正本/副本/电子文件信封）项目编号：                                    