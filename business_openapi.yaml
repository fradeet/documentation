  /workflow/getTariffStatus:
    post:
      summary: 关税状态查询
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                status: 100
                message: 操作成功
                data:
                  id: 378
                  website_id: 10
                  uid: 10
                  type: 7
                  request_json: >-
                    {"year": "2025", "product": "男士皮带", "to_country": "美国",
                    "from_country": "中国"}
                  response_json: >-
                    "### 1. 输入标准化与属性萃取\n\n- **出口国（from_country）**: 中国\n-
                    **进口国（to_country）**: 美国\n- **年份/数据截止日期（year）**: 2025\n-
                    **商品详析（product）**:\n    - 主材料：皮革（假设为天然皮革，如为人造皮请说明，影响归类）\n
                    - 功能/用途：男士腰带，用于固定裤腰和装饰\n    - 是否电动/含电池：否\n    -
                    成品/部件状态：成品皮带\n    -
                    技术指标：常见为长度100-130cm，宽度2-4cm（未特别指明，依通用标准）\n    -
                    适用行业：服装/配饰\n    - 是否为套件：否（单件皮带）\n\n>
                    注：如材料为人造革/塑料/金属或属于特殊功能型请补充说明。\n\n---\n\n### 2.
                    HS编码链式推理与边界归类判定\n\n#### 主要候选编码\n\n1.
                    **4203.30（置信度：95%）**\n    - **归类理由**：\n        - 依据WCO
                    HS品目及美国HTS（Harmonized Tariff
                    Schedule），4203章专用于“服装及衣着附件，天然皮革或组合皮革制”。\n        -
                    4203.30项下为“腰带、带扣且皮革材质”。\n        -
                    官方依据：《WCO六位编码解释》（详见WCO官方网站）、美国HTSUS
                    2024原文—[HTS第4203章](https://hts.usitc.gov/current)\n        -
                    美国CBP历年裁定及CBP Ruling HQ 966549 明确天然皮带归入4203.30。\n    -
                    **权威原文**：[HTSUS 2024
                    4203.30](https://hts.usitc.gov/view/Chapter%2042?release=2024HTSARev2)\n
                    - **边界说明**：仅适用于天然皮制。人造革则列入3926.20。\n\n2.
                    **3926.20（置信度：10%）**\n    - **归类理由**：\n        -
                    如男士皮带为塑料/人造革，归入3926.20（其他塑料制品，衣着配件）。\n        - 官方依据：《HTSUS
                    2024 3926.20》（详见链接）\n    - **权威原文**：[HTSUS 2024
                    3926.20](https://hts.usitc.gov/view/Chapter%2039?release=2024HTSARev2)\n
                    - **边界说明**：若商品成分为天然皮革，则不适用。\n\n3.
                    **6105/6217系列（置信度：5%）**\n    -
                    仅在极特殊情况下（与服装缝合或为服装配套成件才用），常规皮带不适用。\n\n---\n\n####
                    易错归类边界说明\n\n-
                    **材料区分**：天然皮带严格归4203.30；如为人造皮（PU、PVC等），归3926.20。\n-
                    **功能归类**：服饰附件原则优先，非作工业传动带用途（否则HS84章）。\n-
                    **部件/成品区别**：仅成品皮带适用上述编码，未缝制或半成品则可能归其他细表。\n\n---\n\n### 3.
                    美国进口官方主权关税查询与结构化对比\n\n#### 查询对象：4203.30.0000（假设为天然皮革）\n\n|
                    数据来源           | 税率类型 | 适用税率（%）        |
                    生效时间/公告编号             | 限定条件/备注          |
                    官方链接
                    |\n|--------------------|----------|---------------------|----------------------------|-----------------------|------------------------------------------------------------------------------|\n|
                    HTSUS（美关税表）    | MFN（最惠国） | 2.7%                 | 2024HTSA
                    Rev.2 & 2025沿用 | 默认适用，未经特殊豁免 | [美国官方HTS
                    4203.30.0000](https://hts.usitc.gov/view/Chapter%2042?release=2024HTSARev2)
                    |\n| CBP/联邦登记        | 301关税    | 7.5%（对中国，加征） |
                    启动2019/续2024/持续中      | 原产地中国             | [USTR
                    301公告及持续清单](https://ustr.gov/issue-areas/enforcement/section-301-investigations/tariff-actions)
                    |\n| CBP/联邦登记        | 232/201等特别税 | 无                   |
                    2024/2025未列适用         | 无特别豁免事项          |
                    [CBP公告页面](https://www.cbp.gov/)                         |\n|
                    WCO/UNCTAD/WTO      | 参考比对   | MFN一致              |
                    2024/2025当前同步           | —                      |
                    [WTO关税数据库](https://tariffdata.wto.org/Default.aspx?lang=zh)
                    |\n\n> 备注：若出口原产地享有美特殊贸易协定（如USMCA），可优先适用优惠税率，但中国不适用。\n>\n>
                    若为3926.20（塑料皮带），MFN税率为 5.3%，同样适用301加征7.5%。\n\n---\n\n### 4.
                    最终可执行合规结论\n\n**推荐HS编码**：4203.30.0000（男士天然皮带）\n\n**现行美国进口税率（2025年对中国）**：\n-
                    MFN基本关税：2.7%（HTSUS明载）\n-
                    301加征关税：7.5%（2024/2025对中国持续有效，详见USTA公告）\n- 总计：10.2%\n-
                    其他临时税、豁免/配额：无，未见现有效公告\n-
                    原产地、标签、报关文件需严格合规，建议申报预裁定以防归类争议。\n\n**特别风险提示**：\n-
                    若为人造皮革，请补充确认，因归类及税率将不同；\n-
                    301清单持续适用中，若适用豁免或有新公告，以USTR主站公告为准；\n-
                    建议详细保存供应链原材料、生产及出口合规证明材料。\n\n---\n\n### 5.
                    专业权威固定尾注\n\n```\n✅ 最终总关税：10.2%\n✅ 数据截至
                    2024-06-10，均来自进口国及国际官方开放数据库；实际归类及征税以美国海关最终裁定为准。\n```\n\n---\n\n**流程合规与适用性声明**：
                    \n全程采信HTSUS、USTR公告、CBP及WTO/UNCTAD等公开原文数据库，公告文本与链接见上表格。如遇产品属性调整或遇美中双边政策变动，以进口国官报发布最新数据为唯一执行标准。无公告不得默认或引用非权威值。建议进出口前提交详细资料申请美国预裁定确保单证合规、避免高额罚金或误归类查扣。"
                  is_delete: 0
                  is_interrupt: 0
                  status: Success
                  execute_id: null
                  msg: null
                  workflow_type: 0
                  create_time: '2025-10-30 10:51:16'
                  update_time: '2025-10-30 15:12:43'
                  is_collect: 0
