              example:
                status: 100
                message: 操作成功
                data:
                  id: 258
                  execute_id: '7565776600634621990'
                  status: Success
                  response_json: >-
                    "##
                    全局设定：\n短视频营销广告；快节奏开场（Hook），随后短视频营销广告风格镜头，产品严格参考上传图片，严格遵循旁白，不加其他多余旁白；品牌乐高高玩具；场景温馨客厅，包含暖光台灯、浅木书桌、绿植、浅木书架等元素；人物25岁东亚男性，阳光活力自信；产品紫色熊玩偶（橙色连帽衫印“UNSUNG
                    HERO”文字及白色星星图案、紫色头部与手臂、蓝色裤子、白色鞋子，右手举黄色星星）；氛围温馨治愈、可爱活泼，暖光光斑背景；声音旁白中文，Hook强情绪，后续镜头旁白简洁贴合画面；24-30fps，镜头运动流畅，产品细节锐利清晰，无多余字幕。\n##
                    分镜设定：\n1.
                    镜头1（hook）（3s）：吸引注意力，传递玩偶萌趣与视觉亮点；中景平视，主播站在温馨客厅（暖光台灯、浅木桌、背景暖光光斑）；紫色熊玩偶（橙色连帽衫、举黄色星星）；主播快速从身后掏出玩偶，玩偶的黄色星星瞬间发暖黄光，背景光斑同步提亮，主播笑举玩偶；旁白“看！超萌小英雄！”。\n2.
                    镜头2（2s）：展示产品细节设计；近景平视，主播手持玩偶正对镜头；连帽衫黑色抽绳、“UNSUNG
                    HERO”文字及白色星星；主播轻转玩偶，镜头推近特写文字与星星；旁白“细节超治愈～”。\n3.
                    镜头3（2s）：展示书架摆设适配性；中景俯视，玩偶放浅木书架（旁有绿植、相框）；镜头从玩偶拉远，展示书架环境；旁白“书架变活泼啦！”。\n4.
                    镜头4（3s）：展示书桌摆设适配性；中景平视，玩偶放浅木书桌（旁有笔记本、钢笔）；主播坐书桌前调整玩偶位置，镜头从玩偶拉远至整个书桌；旁白“书桌更可爱啦！”。\n##
                    其他补充：\n玩偶星星发光为暖黄色柔和光，背景光斑为暖橙色；镜头运动流畅自然，无生硬切换；产品色彩与场景暖光呼应，强化温馨感。"
                  request_json: >-
                    {"actor": "25岁青年东亚男性，阳光活力自信", "image":
                    "https://wenlv-debug.oss-cn-shenzhen.aliyuncs.com/carimg/2baf3c/2025-10/0//coze_three_view202510231634589217.png",
                    "scene": "根据产品自行设计", "product": "乐高高玩具", "language": "中文",
                    "narration": "true", "frame_style": "真实真人", "video_style":
                    "短视频营销广告", "key_features": "摆设", "video_length": "0"}
